<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>SUM PRO - Final Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <style>
        * { box-sizing: border-box; outline: none; }
        body { margin: 0; background: #0b141a; color: #fff; font-family: sans-serif; }
        .container { padding: 10px; }
        #calendar { background: #111b21; border-radius: 12px; padding: 10px; border: 1px solid #2a3942; height: 80vh; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,.9); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 10px; backdrop-filter: blur(4px); }
        .modal-content { background: #1c272e; padding: 20px; border-radius: 20px; width: 100%; max-width: 360px; text-align: center; border: 1px solid #32444e; }
        .input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #2a3942; background: #222e35; color: #fff; text-align: center; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; margin-top: 10px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 14px; transition: 0.2s; }
        .blue { background: #00a884; color: #fff; }
        .green { background: #25d366; color: #fff; }
        #results { background: #222e35; border-radius: 10px; max-height: 120px; overflow-y: auto; margin-top: -5px; }
        #results div { padding: 12px; border-bottom: 1px solid #2a3942; cursor: pointer; text-align: left; }
        #preview { width: 100%; max-height: 150px; object-fit: contain; border-radius: 10px; margin: 10px 0; display: none; border: 1px solid #00a884; }
        #loading { display: none; margin: 10px 0; color: #00d2ff; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

<div class="container"><div id="calendar"></div></div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="fecha-label" style="margin:0 0 10px 0; color:#8696a0;"></h3>
        
        <div id="ui-search">
            <input id="search" class="input" placeholder="Buscar Unidad o Nombre">
            <div id="results"></div>
        </div>

        <div id="card" style="display:none">
            <p id="info-uf" style="font-weight: bold; color: #00a884; font-size: 18px; margin: 10px 0;"></p>
            
            <img id="preview" src="">
            
            <label for="file-input" style="display:block; padding:15px; border:2px dashed #00a884; border-radius:10px; cursor:pointer; margin:10px 0; color:#00d2ff; font-size: 13px;">
                📷 <span id="file-text">SUBIR COMPROBANTE</span>
            </label>
            <input type="file" id="file-input" accept="image/*" style="display:none">

            <div id="loading">🚀 SUBIENDO IMAGEN... POR FAVOR ESPERÁ</div>
            
            <button id="btn-procesar" class="btn blue">GUARDAR DATOS</button>
            <a id="btn-wa" class="btn green" style="display:none" target="_blank">ENVIAR WHATSAPP ✅</a>
        </div>
        
        <button class="btn" style="background:transparent; color:#8696a0" onclick="cerrar()">Cancelar</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const config = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto" };
const app = initializeApp(config);
const db = getFirestore(app);

const CLOUD_NAME = "dhryws88e", UPLOAD_PRESET = "ml_default", PHONE = "5491131552679";
let dataUFs = [], reservas = [], selUF = null, fotoBlob = null, modoReserva = true;

async function init(){
    const snap = await getDocs(collection(db,"departamentos"));
    dataUFs = snap.docs.map(d => ({ UF: d.data().UF || d.data().Unidad, Inquilino: d.data().Inquilino || "Sin Nombre" }));
}
init();

const cal = new FullCalendar.Calendar(document.getElementById('calendar'),{
    initialView:'dayGridMonth', locale: 'es',
    dateClick:(i) => abrir(i.dateStr),
    eventClick:(i) => abrir(i.event.startStr)
});
cal.render();

onSnapshot(collection(db,"reservas_salon"), snap => {
    reservas = snap.docs.map(d => ({id:d.id, ...d.data()}));
    cal.setOption('events', reservas.map(r => ({
        title: "UF " + r.uf, start: r.fecha, backgroundColor: r.comprobanteUrl ? '#00a884' : '#e91e63', borderColor: 'transparent'
    })));
});

window.abrir = (fecha) => {
    selUF = null; fotoBlob = null; window.fechaSel = fecha;
    document.getElementById('fecha-label').innerText = fecha.split('-').reverse().join('/');
    document.getElementById('modal').style.display = "flex";
    document.getElementById('ui-search').style.display = "block";
    document.getElementById('card').style.display = "none";
    document.getElementById('preview').style.display = "none";
    document.getElementById('preview').src = "";
    document.getElementById('btn-wa').style.display = "none";
    document.getElementById('btn-procesar').style.display = "flex";
    document.getElementById('file-input').value = "";
    document.getElementById('file-text').innerText = "SUBIR COMPROBANTE";

    const res = reservas.find(r => r.fecha === fecha);
    if(res) {
        modoReserva = false; window.idReserva = res.id;
        selUF = { UF: res.uf, Inquilino: res.inquilino };
        document.getElementById('ui-search').style.display = "none";
        document.getElementById('card').style.display = "block";
        document.getElementById('info-uf').innerText = `UF ${res.uf} - ${res.inquilino}`;
        document.getElementById('btn-procesar').innerText = "ACTUALIZAR PAGO";
    } else {
        modoReserva = true;
        document.getElementById('btn-procesar').innerText = "GUARDAR RESERVA";
    }
};

window.cerrar = () => document.getElementById('modal').style.display = "none";

// MANEJO DE IMAGEN
document.getElementById('file-input').onchange = function(e) {
    const file = e.target.files;
    if (!file) return;
    
    fotoBlob = file; // Guardamos el archivo original para asegurar que no se pierda
    const label = document.getElementById('file-text');
    const preview = document.getElementById('preview');
    
    label.innerText = "⌛ CARGANDO...";
    
    const reader = new FileReader();
    reader.onload = function(event) {
        preview.src = event.target.result;
        preview.style.display = "block";
        label.innerText = "✅ IMAGEN CARGADA";
    };
    reader.readAsDataURL(file);
};

document.getElementById('search').oninput = (e) => {
    const v = e.target.value.toLowerCase();
    const cont = document.getElementById('results'); cont.innerHTML = "";
    if(!v) return;
    dataUFs.filter(u => u.Inquilino.toLowerCase().includes(v) || u.UF.toString().includes(v)).slice(0,5).forEach(u => {
        const d = document.createElement('div');
        d.innerText = `UF ${u.UF} - ${u.Inquilino}`;
        d.onclick = () => {
            selUF = u;
            document.getElementById('card').style.display = "block";
            document.getElementById('info-uf').innerText = `UF ${u.UF} - ${u.Inquilino}`;
            document.getElementById('ui-search').style.display = "none";
        };
        cont.appendChild(d);
    });
};

document.getElementById('btn-procesar').onclick = async () => {
    if(!selUF) return alert("Error: No se seleccionó Unidad");
    
    const btn = document.getElementById('btn-procesar');
    const load = document.getElementById('loading');
    
    btn.style.display = "none";
    load.style.display = "block";

    let urlFinal = "";

    // SUBIDA A CLOUDINARY CON VALIDACIÓN FUERTE
    if(fotoBlob) {
        const fd = new FormData();
        fd.append("file", fotoBlob);
        fd.append("upload_preset", UPLOAD_PRESET);
        
        try {
            const resp = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                method: "POST",
                body: fd
            });
            const data = await resp.json();
            
            if(data.secure_url) {
                urlFinal = data.secure_url;
            } else {
                console.error("Cloudinary Error:", data);
                alert("Ojo: La imagen no se subió (revisá el preset en Cloudinary)");
            }
        } catch(e) {
            console.error("Fetch Error:", e);
            alert("Error de conexión al subir la imagen");
        }
    }

    // GUARDAR EN FIREBASE
    try {
        let msjWhatsApp = "";
        const datos = { 
            fecha: window.fechaSel, 
            uf: selUF.UF, 
            inquilino: selUF.Inquilino, 
            comprobanteUrl: urlFinal 
        };

        if(modoReserva) {
            await addDoc(collection(db,"reservas_salon"), datos);
            msjWhatsApp = `*NUEVA RESERVA SUM*\n📍 *UF:* ${selUF.UF}\n👤 *Inquilino:* ${selUF.Inquilino}\n📅 *Fecha:* ${window.fechaSel}`;
        } else {
            await updateDoc(doc(db, "reservas_salon", window.idReserva), { comprobanteUrl: urlFinal });
            msjWhatsApp = `*PAGO SUM ACTUALIZADO*\n📍 *UF:* ${selUF.UF}\n👤 *Inquilino:* ${selUF.Inquilino}\n📅 *Fecha:* ${window.fechaSel}`;
        }

        // AGREGAR EL LINK SI EXISTE
        if(urlFinal) {
            msjWhatsApp += `\n🔗 *Comprobante:* ${urlFinal}`;
        }

        // MOSTRAR BOTÓN WHATSAPP
        const btnWA = document.getElementById('btn-wa');
        btnWA.href = `https://wa.me/${PHONE}?text=${encodeURIComponent(msjWhatsApp)}`;
        btnWA.style.display = "flex";
        
        load.style.display = "none";
        alert("✅ PROCESO COMPLETADO");

    } catch(err) {
        alert("Error al guardar en Firebase: " + err.message);
        btn.style.display = "flex";
        load.style.display = "none";
    }
};
</script>
</body>
</html>
