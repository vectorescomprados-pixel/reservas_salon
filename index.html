<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>SUM - Gestión Pro</title>
    
    <!-- Librerías Críticas (Cargadas al inicio) -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --bg-deep: #0b141a; 
            --card-bg: #111b21; 
            --primary-blue: #2563eb; 
            --danger-red: #e11d48; 
            --text-main: #e9edef; 
            --border-color: #222d34;
            --accent-orange: #f59e0b;
        }

        body { 
            margin: 0; background: var(--bg-deep); color: var(--text-main); 
            font-family: 'Segoe UI', sans-serif;
        }
        
        .container { width: 95%; max-width: 480px; margin: 0 auto; padding-top: 10px; }

        /* Estilo Cabecera Foto 2 */
        .app-header { 
            background: var(--card-bg); padding: 15px; 
            border-bottom: 2px solid var(--primary-blue); border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 15px;
        }
        
        .status-dot { font-size: 10px; text-align: center; margin-bottom: 10px; color: #22c55e; }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .btn-ui { 
            height: 40px; border-radius: 8px; border: none; font-weight: bold; 
            font-size: 11px; cursor: pointer; color: white; text-transform: uppercase;
            background: #374151;
        }
        .btn-red { background: var(--danger-red); }
        .btn-blue { background: var(--primary-blue); }

        /* Calendario Oscuro */
        #calendar { 
            background: var(--card-bg); border-radius: 15px; padding: 10px; 
            border: 1px solid var(--border-color); min-height: 400px;
        }
        .fc-theme-standard td, .fc-theme-standard th { border: 1px solid var(--border-color) !important; }
        .fc-toolbar-title { font-size: 1.1em !important; color: var(--primary-blue); }

        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .modal-card { 
            background: var(--card-bg); padding: 25px; border-radius: 20px; 
            width: 85%; max-width: 350px; border: 1px solid var(--border-color);
            position: relative;
        }
        .modal-card::before {
            content: ""; position: absolute; left: 0; top: 20%; bottom: 20%; 
            width: 4px; background: var(--accent-orange);
        }

        #log-panel { background: #000; color: #40c4ff; font-family: monospace; font-size: 10px; padding: 10px; border-radius: 10px; margin-top: 10px; }
        .hidden { display: none; }
        select { width: 100%; height: 45px; margin: 15px 0; background: #1a242b; color: #fff; border-radius: 10px; border: 1px solid var(--border-color); padding: 0 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="app-header">
            <div class="status-dot">● EN LÍNEA - SEGURIDAD ACTIVA</div>
            <div class="btn-row">
                <button onclick="location.reload()" class="btn-ui">HISTORIAL</button>
                <button class="btn-ui btn-red">CERRAR</button>
            </div>
            <div id="log-panel">Iniciando sistema...</div>
        </div>

        <div id="calendar"></div>
    </div>

    <!-- Modal Gestor -->
    <div id="modal-gestor" class="modal hidden">
        <div class="modal-card">
            <h3 id="modal-title" style="margin:0; color:var(--primary-blue)">Gestión</h3>
            <p id="fecha-label" style="font-size: 12px; color: #8a96a3;"></p>
            
            <div id="ui-crear">
                <select id="select-uf-lista"><option>Cargando...</option></select>
                <button id="btn-save" class="btn-ui btn-blue" style="width:100%; height:45px">AGENDAR RESERVA</button>
            </div>

            <div id="ui-borrar" class="hidden">
                <div style="background:#1a242b; padding:15px; border-radius:10px; margin-bottom:15px">
                    <b id="detalle-reserva" style="color:var(--accent-orange)"></b>
                </div>
                <button id="btn-delete" class="btn-ui btn-red" style="width:100%; height:45px">CANCELAR RESERVA</button>
            </div>

            <button onclick="cerrarModal()" class="btn-ui" style="width:100%; margin-top:10px; background:none">VOLVER</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
            authDomain: "gestionuf-remoto.firebaseapp.com", 
            projectId: "gestionuf-remoto", 
            storageBucket: "gestionuf-remoto.firebasestorage.app", 
            messagingSenderId: "724452752860", 
            appId: "1:724452752860:web:4d25585addcdcbd146e319" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const PASS = "1131552679";[cite: 1]
        
        let ufs = {}, reservas = [], selDate = "";

        const log = (m) => document.getElementById("log-panel").innerText = "> " + m;

        // 1. Cargar Directorio
        async function loadUFs() {
            try {
                const snap = await getDocs(collection(db, "departamentos"));[cite: 1]
                const sel = document.getElementById("select-uf-lista");
                sel.innerHTML = '<option value="">Elegir Unidad...</option>';
                snap.forEach(d => {
                    const data = d.data();
                    const n = data.UF || data.Unidad;
                    ufs[n] = data.TelefonoInquilino || "Sin tel";
                    let o = document.createElement("option"); o.value = n; o.innerText = `UF ${n} - ${data.Apellido || ''}`;
                    sel.appendChild(o);
                });
                log("Sistema Sincronizado.");
            } catch (e) { log("Error de conexión Firebase."); }
        }

        // 2. Calendario
        const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
            initialView: 'dayGridMonth',
            locale: 'es',
            headerToolbar: { left: 'prev', center: 'title', right: 'next' },
            dateClick: (info) => openModal(info.dateStr)
        });
        calendar.render();

        // 3. Reservas Tiempo Real
        onSnapshot(collection(db, "reservas_salon"), (snap) => {[cite: 1]
            reservas = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            calendar.setOption('events', reservas.map(r => ({
                title: `UF ${r.uf}`, start: r.fecha, backgroundColor: '#e11d48', borderColor: '#e11d48'
            })));
        });

        function openModal(fecha) {
            selDate = fecha;
            const res = reservas.find(r => r.fecha === fecha);
            document.getElementById("modal-gestor").classList.remove("hidden");
            document.getElementById("fecha-label").innerText = "Día: " + fecha;

            if (res) {
                document.getElementById("ui-crear").classList.add("hidden");
                document.getElementById("ui-borrar").classList.remove("hidden");
                document.getElementById("detalle-reserva").innerText = "OCUPADO POR UF " + res.uf;
                document.getElementById("btn-delete").onclick = () => deleteRes(res.id);
            } else {
                document.getElementById("ui-crear").classList.remove("hidden");
                document.getElementById("ui-borrar").classList.add("hidden");
            }
        }

        document.getElementById("btn-save").onclick = async () => {
            const val = document.getElementById("select-uf-lista").value;
            if(!val) return;
            await addDoc(collection(db, "reservas_salon"), {[cite: 1]
                fecha: selDate, uf: val, tel: ufs[val], ts: new Date() 
            });
            window.open(`https://wa.me/5491131552679?text=Nueva Reserva: ${selDate} UF ${val}`);[cite: 1]
            cerrarModal();
        };

        async function deleteRes(id) {
            if(prompt("CLAVE:") !== PASS) return alert("Error");[cite: 1]
            await deleteDoc(doc(db, "reservas_salon", id));[cite: 1]
            cerrarModal();
        }

        window.cerrarModal = () => document.getElementById("modal-gestor").classList.add("hidden");
        loadUFs();
    </script>
</body>
</html>
