<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>SUM PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b141a">

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif}

body{
    background:#0b141a;
    color:#fff;
}

/* CALENDARIO */
#calendar{
    height:100vh;
    padding:10px;
}

/* MODAL FIX REAL */
.modal{
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.7);
    z-index:9999;
}

/* CONTENEDOR */
.modal-box{
    width:95%;
    max-width:400px;
    background:#121b22;
    border-radius:20px;
    padding:20px;
    box-shadow:0 10px 40px rgba(0,0,0,.8);
}

/* INPUT */
.input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:none;
    background:#1f2c33;
    color:#fff;
    margin:10px 0;
}

/* BOTONES */
.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    font-weight:bold;
}

.blue{background:#00a884}
.green{background:#25d366}
.red{background:#ff4444}

/* RESULTADOS */
#results div{
    padding:10px;
    border-bottom:1px solid #333;
}

/* IMAGEN */
#preview{
    width:100%;
    max-height:200px;
    margin-top:10px;
    border-radius:10px;
    display:none;
}

/* LOADER */
#loading{
    display:none;
    text-align:center;
    margin-top:10px;
}

/* MOBILE FIX */
@media (max-height:600px){
    .modal-box{
        max-height:90vh;
        overflow:auto;
    }
}
</style>
</head>

<body>

<div id="calendar"></div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-box">

        <h3 id="fecha"></h3>

        <div id="searchBox">
            <input id="search" class="input" placeholder="Buscar UF o Inquilino">
            <div id="results"></div>
            <button id="btnDelete" class="btn red" style="display:none">BORRAR PRUEBAS</button>
        </div>

        <div id="card" style="display:none">
            <p id="info"></p>

            <input type="file" id="file">
            <img id="preview">

            <div id="loading">Subiendo...</div>

            <button id="guardar" class="btn blue">Guardar</button>
            <a id="wa" class="btn green" target="_blank" style="display:none">Enviar WhatsApp</a>
        </div>

        <button class="btn" onclick="cerrar()">Cerrar</button>

    </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* CONFIG */
const app = initializeApp({
 apiKey:"AIzaSyDx...",
 authDomain:"gestionuf-remoto.firebaseapp.com",
 projectId:"gestionuf-remoto"
});

const db = getFirestore(app);

const CLOUD="dhryws88e";
const PRESET="ml_default";

let UFs=[], reservas=[], sel=null, file=null;

/* CARGA UFs */
const snap = await getDocs(collection(db,"departamentos"));
UFs = snap.docs.map(d=>d.data());

/* CALENDARIO */
const cal = new FullCalendar.Calendar(document.getElementById('calendar'),{
 initialView:'dayGridMonth',
 locale:'es',
 dateClick:e=>abrir(e.dateStr)
});
cal.render();

/* REALTIME */
onSnapshot(collection(db,"reservas_salon"), snap=>{
 reservas = snap.docs.map(d=>({id:d.id,...d.data()}));
 cal.setOption('events', reservas.map(r=>({
  title:"UF "+r.uf,
  start:r.fecha
 })));
});

/* ABRIR */
window.abrir = (f)=>{
 document.getElementById("modal").style.display="flex";
 document.getElementById("fecha").innerText=f;
 document.getElementById("searchBox").style.display="block";
 document.getElementById("card").style.display="none";
};

/* CERRAR */
window.cerrar = ()=>{
 document.getElementById("modal").style.display="none";
};

/* BUSCAR */
search.oninput=(e)=>{
 let v=e.target.value.toLowerCase();
 results.innerHTML="";

 document.getElementById("btnDelete").style.display = (v==="borrar")?"block":"none";

 if(!v || v==="borrar") return;

 UFs.filter(u=>u.Inquilino.toLowerCase().includes(v))
 .slice(0,5)
 .forEach(u=>{
   let d=document.createElement("div");
   d.innerText=u.Inquilino;
   d.onclick=()=>{
     sel=u;
     searchBox.style.display="none";
     card.style.display="block";
     info.innerText=u.Inquilino;
   };
   results.appendChild(d);
 });
};

/* PREVIEW */
file.onchange=(e)=>{
 file=e.target.files[0];
 preview.src=URL.createObjectURL(file);
 preview.style.display="block";
};

/* GUARDAR */
guardar.onclick=async()=>{
 if(!sel) return alert("Elegí UF");

 loading.style.display="block";

 let url="";

 if(file){
  const fd=new FormData();
  fd.append("file", file);
  fd.append("upload_preset", PRESET);

  const r=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD}/image/upload`,{
   method:"POST", body:fd
  });
  const d=await r.json();
  url=d.secure_url||"";
 }

 await addDoc(collection(db,"reservas_salon"),{
  fecha:fecha.innerText,
  uf:sel.UF,
  inquilino:sel.Inquilino,
  comprobanteUrl:url
 });

 loading.style.display="none";

 wa.href=`https://wa.me/?text=Reserva ${sel.Inquilino}`;
 wa.style.display="block";
};

/* BORRAR TODO 🔥 */
btnDelete.onclick=async()=>{
 if(!confirm("Borrar TODO?")) return;

 const snap = await getDocs(collection(db,"reservas_salon"));
 for(const d of snap.docs){
   await deleteDoc(doc(db,"reservas_salon",d.id));
 }

 alert("Firebase limpio");

 // ⚠️ Cloudinary requiere backend para borrar real
};

</script>

</body>
</html>
