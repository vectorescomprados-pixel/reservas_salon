<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
<title>SUM PRO</title>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    background:#0b141a;
    color:#fff;
    font-family:sans-serif;
    height:100vh;
    overflow:hidden;
}

/* CALENDARIO */
#calendar{
    background:#111b21;
    border-radius:12px;
    padding:10px;
    height:85vh;
    margin:10px;
    border:1px solid #2a3942;
}

/* MODAL */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.9);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index:99999;
    padding:10px;
}

.modal-content{
    background:#1c272e;
    width:100%;
    max-width:420px;
    border-radius:20px 20px 0 0;
    padding:20px;
    max-height:85vh;
    overflow-y:auto;
    animation:slideUp .25s ease;
}

@keyframes slideUp{
    from{transform:translateY(40px);opacity:0}
    to{transform:translateY(0);opacity:1}
}

/* INPUT */
.input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:none;
    background:#222;
    color:#fff;
    text-align:center;
    font-size:16px;
}

/* BOTONES */
.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    font-weight:bold;
    cursor:pointer;
}

.blue{background:#00a884;color:#fff}
.green{background:#25d366;color:#fff}

/* RESULTADOS */
#results{
    max-height:200px;
    overflow-y:auto;
    background:#222;
    border-radius:10px;
    margin-top:5px;
}

#results div{
    padding:12px;
    border-bottom:1px solid #333;
}

/* IMAGEN */
#preview{
    width:100%;
    max-height:200px;
    display:none;
    margin:10px 0;
    border-radius:10px;
    object-fit:contain;
    border:2px solid #00a884;
    background:#000;
}

#loading{
    display:none;
    text-align:center;
    margin:10px 0;
}
</style>
</head>

<body>

<div id="calendar"></div>

<div id="modal" class="modal">
<div class="modal-content">

<h3 id="fecha-label"></h3>

<div id="ui-search">
<input id="search" class="input" placeholder="Buscar UF o Inquilino">
<div id="results"></div>
</div>

<div id="card" style="display:none">

<p id="info-uf"></p>

<img id="preview">

<label style="display:block;padding:15px;border:2px dashed #444;border-radius:10px;text-align:center;margin:10px 0">
📷 Subir comprobante
<input type="file" id="file-input" accept="image/*" style="display:none">
</label>

<div id="loading">⌛ Subiendo...</div>

<button id="btn-procesar" class="btn blue">Guardar</button>
<a id="btn-wa" class="btn green" style="display:none" target="_blank">WhatsApp</a>

</div>

<button class="btn" onclick="cerrar()">Cerrar</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
    apiKey:"AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo",
    authDomain:"gestionuf-remoto.firebaseapp.com",
    projectId:"gestionuf-remoto"
});

const db = getFirestore(app);

const CLOUD_NAME="dhryws88e";
const UPLOAD_PRESET="ml_default";
const PHONE="5491131552679";

let dataUFs=[],reservas=[],selUF=null,foto=null;

/* FORMATO FECHA */
function formatear(fecha){
    const [y,m,d]=fecha.split("-");
    return `${d}-${m}-${y.slice(2)}`;
}

/* CARGAR UFs */
(async()=>{
    const snap=await getDocs(collection(db,"departamentos"));
    dataUFs=snap.docs.map(d=>({
        UF:d.data().UF || d.data().Unidad,
        Inquilino:d.data().Inquilino || "Sin Nombre"
    }));
})();

/* CALENDARIO */
const cal=new FullCalendar.Calendar(document.getElementById("calendar"),{
    initialView:"dayGridMonth",
    locale:"es",
    dateClick:i=>abrir(i.dateStr),
    eventClick:i=>abrir(i.event.startStr)
});
cal.render();

/* LISTENER */
onSnapshot(collection(db,"reservas_salon"),snap=>{
    reservas=snap.docs.map(d=>({id:d.id,...d.data()}));
    cal.setOption("events",reservas.map(r=>({
        title:"UF "+r.uf,
        start:r.fecha,
        backgroundColor:r.comprobanteUrl ? "#00a884" : "#e91e63"
    })));
});

/* ABRIR */
window.abrir=(fecha)=>{
    selUF=null;
    foto=null;
    window.fechaSel=fecha;

    document.getElementById("modal").style.display="flex";
    document.getElementById("fecha-label").innerText=formatear(fecha);
    document.getElementById("card").style.display="none";
    document.getElementById("ui-search").style.display="block";
    document.getElementById("btn-wa").style.display="none";
};

/* CERRAR */
window.cerrar=()=>document.getElementById("modal").style.display="none";

/* BUSCADOR */
search.oninput=e=>{
    const v=e.target.value.toLowerCase();
    results.innerHTML="";
    if(!v)return;

    dataUFs.filter(u=>u.Inquilino.toLowerCase().includes(v)||u.UF.toString().includes(v))
    .slice(0,5)
    .forEach(u=>{
        const d=document.createElement("div");
        d.innerText=`UF ${u.UF} - ${u.Inquilino}`;
        d.onclick=()=>{
            selUF=u;
            card.style.display="block";
            ui-search.style.display="none";
            info-uf.innerText=d.innerText;
        };
        results.appendChild(d);
    });
};

/* IMAGEN */
file-input.onchange=e=>{
    const file=e.target.files[0];
    if(!file)return;
    foto=file;

    const reader=new FileReader();
    reader.onload=x=>{
        preview.src=x.target.result;
        preview.style.display="block";
    };
    reader.readAsDataURL(file);
};

/* GUARDAR */
btn-procesar.onclick=async()=>{
    if(!selUF)return alert("Elegí UF");

    btn-procesar.style.display="none";
    loading.style.display="block";

    let url="";

    if(foto){
        const fd=new FormData();
        fd.append("file",foto);
        fd.append("upload_preset",UPLOAD_PRESET);

        const r=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{
            method:"POST",
            body:fd
        });

        const d=await r.json();
        if(d.secure_url) url=d.secure_url;
    }

    const payload={
        fecha:window.fechaSel,
        uf:selUF.UF,
        inquilino:selUF.Inquilino,
        comprobanteUrl:url
    };

    await addDoc(collection(db,"reservas_salon"),payload);

    const msg=`Reserva SUM
📅 ${formatear(window.fechaSel)}
UF ${selUF.UF}
${selUF.Inquilino}
${url}`;

    btn-wa.href=`https://wa.me/${PHONE}?text=${encodeURIComponent(msg)}`;
    btn-wa.style.display="block";

    loading.style.display="none";
    alert("Guardado OK");
};

</script>
</body>
</html>
