<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SUM PRO</title>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<style>
/* 🌌 BASE */
body{
margin:0;
font-family:-apple-system,sans-serif;
background: radial-gradient(circle at top,#0f2027,#0b141a);
color:#fff;
}

/* 📅 CALENDARIO */
#calendar{
height:calc(100vh - 20px);
margin:10px;
background:#111b21;
border-radius:15px;
padding:10px;
}

/* 🧊 MODAL */
.modal{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,.7);
backdrop-filter:blur(10px);
z-index:999999;
}

/* 🪟 CARD */
.modal-content{
width:95%;
max-width:380px;
padding:25px;
border-radius:20px;
background:rgba(28,39,46,0.7);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 10px 40px rgba(0,0,0,0.6);
animation:fadeIn .25s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* 🔤 INPUT */
.input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:#1a252c;
color:#fff;
margin-top:10px;
text-align:center;
box-sizing: border-box;
}

/* 📋 RESULTADOS */
#results{
background:#1c272e;
border-radius:12px;
max-height:150px;
overflow-y:auto;
margin-top:5px;
border:1px solid #2a3942;
}

#results div{
padding:12px;
border-bottom:1px solid #2a3942;
cursor:pointer;
transition:.2s;
}
#results div:hover{
background:#00a88433;
}

/* 🔘 BOTONES */
.btn{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
transition:.25s;
display: block;
text-align: center;
text-decoration: none;
box-sizing: border-box;
}

.blue{
background:linear-gradient(135deg,#00c6ff,#0072ff);
color:#fff;
}
.blue:hover{transform:scale(1.03);}

.green{
background:linear-gradient(135deg,#25d366,#128c7e);
color:#fff;
}

/* 📱 MOBILE */
@media(max-width:480px){
#calendar{height:75vh;margin:5px;padding:5px;}
.modal-content{padding:20px;border-radius:16px;}
.btn{font-size:14px;padding:13px;}
}
</style>
</head>

<body>

<div id="calendar"></div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="fecha-label" style="text-align: center;"></h3>

        <div id="ui-search">
            <input id="search" class="input" placeholder="Buscar UF o Inquilino">
            <div id="results"></div>
        </div>

        <div id="card" style="display:none">
            <p id="info-uf" style="text-align: center; font-size: 1.1em; font-weight: bold;"></p>
            
            <button id="btn-procesar" class="btn blue">GUARDAR RESERVA</button>
            <a id="btn-wa" class="btn green" style="display:none" target="_blank">ENVIAR POR WHATSAPP</a>
        </div>

        <button class="btn" style="background:#444; color:white" onclick="cerrar()">Cerrar</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 CONFIGURACIÓN */
const PHONE = "5491131552679"; // Tu número guardado
const firebaseConfig = {
    apiKey: "AIzaSyDx...", 
    authDomain: "gestionuf-remoto.firebaseapp.com",
    projectId: "gestionuf-remoto"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let dataUFs = [], reservas = [], selUF = null;

/* FORMATO FECHA */
function formatFecha(f){
    const [y,m,d] = f.split("-");
    return `${d}-${m}-${y.slice(2)}`;
}

/* CARGAR DEPARTAMENTOS */
(async()=>{
    const snap = await getDocs(collection(db, "departamentos"));
    dataUFs = snap.docs.map(d => ({
        UF: d.data().UF || d.data().Unidad,
        Inquilino: d.data().Inquilino || "Sin Nombre"
    }));
})();

/* CALENDARIO */
const cal = new FullCalendar.Calendar(document.getElementById('calendar'), {
    initialView: 'dayGridMonth',
    locale: 'es',
    dateClick: i => abrir(i.dateStr),
    eventClick: i => abrir(i.event.startStr)
});
cal.render();

/* REALTIME */
onSnapshot(collection(db, "reservas_salon"), snap => {
    reservas = snap.docs.map(d => ({id: d.id, ...d.data()}));
    cal.setOption('events', reservas.map(r => ({
        title: `UF ${r.uf}`,
        start: r.fecha,
        backgroundColor: '#00a884'
    })));
});

/* ABRIR MODAL */
window.abrir = (fecha) => {
    window.fechaSel = fecha;
    selUF = null;
    
    document.getElementById('modal').style.display = "flex";
    document.getElementById('fecha-label').innerText = formatFecha(fecha);
    document.getElementById('ui-search').style.display = "block";
    document.getElementById('card').style.display = "none";
    document.getElementById('btn-wa').style.display = "none";
    document.getElementById('search').value = "";

    const res = reservas.find(r => r.fecha === fecha);
    if(res) {
        window.modo = false; // Editar
        window.id = res.id;
        selUF = {UF: res.uf, Inquilino: res.inquilino};
        mostrarDetalleReserva();
    } else {
        window.modo = true; // Nuevo
    }
};

window.cerrar = () => document.getElementById('modal').style.display = "none";

function mostrarDetalleReserva() {
    document.getElementById('ui-search').style.display = "none";
    document.getElementById('card').style.display = "block";
    document.getElementById('info-uf').innerText = `UF ${selUF.UF} - ${selUF.Inquilino}`;
}

/* BUSCADOR */
document.getElementById('search').oninput = e => {
    const v = e.target.value.toLowerCase();
    const cont = document.getElementById('results');
    cont.innerHTML = "";
    if(!v) return;

    dataUFs.filter(u => u.Inquilino.toLowerCase().includes(v) || u.UF.toString().includes(v))
    .slice(0, 5)
    .forEach(u => {
        const d = document.createElement('div');
        d.innerText = `UF ${u.UF} - ${u.Inquilino}`;
        d.onclick = () => {
            selUF = u;
            mostrarDetalleReserva();
        };
        cont.appendChild(d);
    });
};

/* GUARDAR Y WHATSAPP */
document.getElementById('btn-procesar').onclick = async () => {
    if(!selUF) return alert("Por favor, selecciona una UF");

    try {
        const datos = {
            fecha: window.fechaSel,
            fechaVisual: formatFecha(window.fechaSel),
            uf: selUF.UF,
            inquilino: selUF.Inquilino
        };

        if(window.modo) {
            await addDoc(collection(db, "reservas_salon"), datos);
        } else {
            await updateDoc(doc(db, "reservas_salon", window.id), datos);
        }

        // Preparar mensaje de WhatsApp
        const msg = `*RESERVA SUM*\n📅 Fecha: ${formatFecha(window.fechaSel)}\n🏠 UF: ${selUF.UF}\n👤 Inquilino: ${selUF.Inquilino}`;
        
        document.getElementById('btn-wa').href = `https://wa.me/${PHONE}?text=${encodeURIComponent(msg)}`;
        document.getElementById('btn-wa').style.display = "block";
        
        alert("¡Reserva guardada correctamente!");
    } catch(e) {
        console.error(e);
        alert("Error al conectar con la base de datos");
    }
};
</script>
</body>
</html>
