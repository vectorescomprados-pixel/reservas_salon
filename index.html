<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
    <title>SUM PRO</title>
    
    <!-- Cargamos las librerías con protocolo seguro explícito -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    
    <style>
        :root { --bg: #0b141a; --card: #111b21; --blue: #2563eb; --text: #e9edef; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 450px; padding: 15px; box-sizing: border-box; }
        
        /* Estética de tu foto */
        .header { background: var(--card); padding: 15px; border-bottom: 3px solid var(--blue); border-radius: 12px; margin-bottom: 20px; text-align: center; }
        .status { color: #22c55e; font-size: 11px; font-weight: bold; margin-bottom: 10px; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { background: #374151; color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        
        /* El contenedor del calendario debe tener altura fija para forzar el renderizado */
        #calendar { background: var(--card); border-radius: 12px; padding: 10px; min-height: 500px; border: 1px solid #222d34; }
        
        /* Ajustes para que el calendario se vea bien en oscuro */
        .fc { color: white; }
        .fc-daygrid-day { min-height: 60px !important; }
        .fc-button { background: #222d34 !important; border: none !important; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 999; }
        .modal-content { background: var(--card); width: 85%; padding: 20px; border-radius: 15px; border-left: 5px solid #f59e0b; }
        select { width: 100%; padding: 12px; margin: 15px 0; background: #1a242b; color: white; border-radius: 8px; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="status">● EN LÍNEA - SEGURIDAD ACTIVA</div>
        <div class="btn-grid">
            <button class="btn" onclick="location.reload()">REINTENTAR</button>
            <button class="btn" style="background:#e11d48">CERRAR</button>
        </div>
        <div id="debug" style="font-size:10px; color:#40c4ff; margin-top:10px;">Cargando módulos...</div>
    </div>

    <div id="calendar"></div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="m-title" style="color:var(--blue); margin-top:0;">Reserva</h3>
        <p id="m-date" style="font-size:12px; color:#888;"></p>
        <select id="m-select"><option value="">Cargando UFs...</option></select>
        <button class="btn" id="m-confirm" style="width:100%; background:var(--blue); margin-bottom:10px;">CONFIRMAR</button>
        <button class="btn" onclick="closeM()" style="width:100%; background:none; color:#888;">CANCELAR</button>
    </div>
</div>

<script type="module">
    // Importación directa para evitar fallos de resolución
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
        authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto", 
        storageBucket: "gestionuf-remoto.firebasestorage.app", 
        messagingSenderId: "724452752860", 
        appId: "1:724452752860:web:4d25585addcdcbd146e319" 
    };

    const debug = document.getElementById('debug');
    
    try {
        const app = initializeApp(config);
        const db = getFirestore(app);
        let reservas = [];
        let ufs = {};

        // RENDER INMEDIATO DEL CALENDARIO
        const calendarEl = document.getElementById('calendar');
        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'es',
            height: 'auto',
            dateClick: function(info) {
                document.getElementById('m-date').innerText = info.dateStr;
                document.getElementById('modal').style.display = 'flex';
                window.selectedDate = info.dateStr;
            }
        });
        calendar.render();
        debug.innerText = "Calendario activo. Conectando DB...";

        // CARGAR UFs
        const snap = await getDocs(collection(db, "departamentos"));
        const sel = document.getElementById('m-select');
        sel.innerHTML = '<option value="">Elegir Unidad...</option>';
        snap.forEach(doc => {
            const d = doc.data();
            const n = d.UF || d.Unidad;
            ufs[n] = d.TelefonoInquilino || "";
            let opt = document.createElement('option');
            opt.value = n; opt.innerText = "UF " + n;
            sel.appendChild(opt);
        });

        // ESCUCHAR RESERVAS
        onSnapshot(collection(db, "reservas_salon"), (s) => {
            reservas = s.docs.map(d => ({...d.data()}));
            calendar.setOption('events', reservas.map(r => ({
                title: 'Ocupado UF ' + r.uf,
                start: r.fecha,
                color: '#e11d48'
            })));
            debug.innerText = "SISTEMA LISTO (OK)";
        });

        // GUARDAR
        document.getElementById('m-confirm').onclick = async () => {
            const u = sel.value;
            if(!u) return alert("Selecciona UF");
            await addDoc(collection(db, "reservas_salon"), {
                fecha: window.selectedDate, uf: u, tel: ufs[u]
            });
            window.open(`https://wa.me/5491131552679?text=Reserva SUM: ${window.selectedDate} UF ${u}`);
            closeM();
        };

    } catch (e) {
        debug.innerText = "ERROR: " + e.message;
        console.error(e);
    }

    window.closeM = () => { document.getElementById('modal').style.display = 'none'; };
</script>

</body>
</html>
