<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>SUM PRO - 3D Dark Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    
    <style>
        :root { 
            --bg: #0b141a; 
            --card: #111b21; 
            --blue: #2563eb; 
            --red: #e11d48; 
            --orange: #f59e0b; 
            --text: #e9edef;
            --border: #222d34;
            --shadow: rgba(0, 0, 0, 0.6);
        }

        body { 
            margin: 0; 
            background: var(--bg); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            color: var(--text);
        }

        /* BARRA SUPERIOR */
        .app-bar { 
            background: var(--card); 
            padding: 15px; 
            border-bottom: 2px solid var(--blue);
            text-align: center;
            box-shadow: 0 4px 10px var(--shadow);
        }

        .container { padding: 12px; }

        /* CALENDARIO CON RELIEVE 3D */
        #calendar { 
            background: var(--card); 
            border-radius: 15px; 
            border: 1px solid #1c272e;
            padding: 5px;
            box-shadow: inset 2px 2px 5px #000, 5px 5px 15px var(--shadow);
        }

        /* CABECERA DE DÍAS OSCURA (Lunes, Martes...) */
        .fc-col-header-cell { 
            background: #070d11 !important; /* Más oscuro que el fondo */
            padding: 12px 0 !important;
            border: 1px solid var(--border) !important;
        }
        .fc-col-header-cell-cushion { 
            color: var(--blue) !important; 
            font-size: 11px; 
            text-transform: uppercase; 
            font-weight: 800;
            letter-spacing: 1px;
        }

        /* CELDAS CON ASPECTO 3D */
        .fc-daygrid-day { 
            min-height: 100px !important; 
            background: #111b21;
            border: 1px solid #1c272e !important;
            transition: 0.2s;
        }
        .fc-daygrid-day:hover { background: #16222a; }
        
        /* Efecto de relieve en los números */
        .fc-daygrid-day-number { 
            font-size: 15px; 
            font-weight: 900; 
            padding: 10px !important; 
            color: #556671;
            text-shadow: 1px 1px 2px #000;
        }

        /* HOY resaltado */
        .fc-day-today { 
            background: rgba(37, 99, 235, 0.05) !important; 
            box-shadow: inset 0 0 10px rgba(37, 99, 235, 0.2);
        }

        /* EVENTOS (Nombres grandes y con relieve) */
        .fc-event {
            background: linear-gradient(145deg, #1e2a33, #111b21) !important;
            border: 1px solid var(--blue) !important;
            border-radius: 8px !important;
            padding: 6px !important;
            margin: 3px !important;
            box-shadow: 3px 3px 6px #000, -1px -1px 3px rgba(255,255,255,0.05);
        }
        .fc-event-title { 
            font-size: 12px !important; 
            font-weight: 900 !important;
            color: #fff !important;
            text-transform: uppercase;
            text-align: center;
            line-height: 1.1;
        }

        /* MODAL */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(8px); }
        .modal-content { 
            background: var(--card); 
            width: 85%; 
            padding: 25px; 
            border-radius: 20px; 
            border: 1px solid #2a3942;
            box-shadow: 10px 10px 30px #000;
        }
        
        input[type="text"] { 
            width: 100%; height: 55px; background: #070d11; border: 1px solid #2a3942; border-radius: 12px; 
            color: white; padding: 0 15px; font-size: 16px; margin-top: 10px;
            box-shadow: inset 2px 2px 5px #000;
        }

        .btn { 
            width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: 900; 
            text-transform: uppercase; margin-top: 12px; cursor: pointer; color: white;
            transition: 0.3s;
        }
        .btn-blue { background: var(--blue); box-shadow: 0 5px 15px rgba(37, 99, 235, 0.4); }
        .btn-red { background: var(--red); box-shadow: 0 5px 15px rgba(225, 29, 72, 0.4); }
        .btn-ghost { background: transparent; color: #556671; }

        .results-list { background: #070d11; border: 1px solid #2a3942; border-radius: 8px; max-height: 150px; overflow-y: auto; margin-top: 5px; }
        .result-item { padding: 15px; border-bottom: 1px solid #1c272e; font-size: 14px; }
    </style>
</head>
<body>

<div class="app-bar">
    <div style="color: #22c55e; font-size: 10px; font-weight: bold;">● TERMINAL DE RESERVAS V9</div>
    <h2 style="margin: 5px 0 0 0; color: var(--blue); font-size: 16px; letter-spacing: 2px;">SALA DE USOS MÚLTIPLES</h2>
</div>

<div class="container">
    <div id="calendar"></div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="m-title" style="margin:0; color:var(--blue); font-size: 14px;">GESTIÓN DE FECHA</h3>
        <p id="m-date" style="color:#556671; font-weight: bold; margin: 10px 0;"></p>

        <div id="ui-crear">
            <div style="font-size: 10px; color: var(--orange); font-weight: bold;">BUSCADOR POR UNIDAD:</div>
            <input type="text" id="search-input" placeholder="Ej: 24A..." autocomplete="off">
            <div id="results" class="results-list" style="display:none"></div>
            
            <div id="selection-card" style="display:none; margin-top: 15px; padding: 15px; background: rgba(37,99,235,0.1); border-radius: 12px; border: 1px solid var(--blue);">
                <span id="label-uf" style="font-size: 18px; font-weight: 900; color: #fff; display: block;"></span>
            </div>
            <button class="btn btn-blue" id="btn-confirm" style="display:none">AGENDAR AHORA</button>
        </div>

        <div id="ui-ocupado" style="display:none">
            <div style="padding:15px; background: rgba(225,29,72,0.1); border-radius:12px; border: 1px solid var(--red);">
                <div style="color:var(--red); font-size: 10px; font-weight: bold;">TURNO ASIGNADO A:</div>
                <span id="info-reserva" style="font-size:18px; font-weight: 900; color: #fff;"></span>
            </div>
            <button class="btn btn-red" id="btn-delete">BORRAR REGISTRO</button>
        </div>

        <button class="btn btn-ghost" onclick="closeM()">VOLVER</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
        authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto", 
        storageBucket: "gestionuf-remoto.firebasestorage.app", 
        messagingSenderId: "724452752860", 
        appId: "1:724452752860:web:4d25585addcdcbd146e319" 
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const MASTER_KEY = "1131552679";

    let dataUFs = []; 
    let reservas = [];
    let selUF = null;

    async function init() {
        const snap = await getDocs(collection(db, "departamentos"));
        dataUFs = snap.docs.map(d => ({
            uf: parseInt(d.data().UF || d.data().Unidad) || 0,
            inquilino: d.data().Inquilino || d.data().NombreInquilino || "",
            tel: d.data().TelefonoInquilino || ""
        }));
    }

    const input = document.getElementById('search-input');
    const results = document.getElementById('results');
    
    input.addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase().trim();
        results.innerHTML = '';
        if(val.length < 1) { results.style.display = 'none'; return; }
        
        let filtered = dataUFs.filter(item => 
            item.inquilino.toLowerCase().includes(val) || item.uf.toString().includes(val)
        ).sort((a,b) => a.uf - b.uf);

        filtered.forEach(item => {
            const div = document.createElement('div');
            div.className = 'result-item';
            div.innerHTML = `<b style="color:var(--orange)">UF ${item.uf}</b> - ${item.inquilino}`;
            div.onclick = () => {
                selUF = item;
                input.value = item.inquilino;
                results.style.display = 'none';
                document.getElementById('selection-card').style.display = 'block';
                document.getElementById('btn-confirm').style.display = 'block';
                document.getElementById('label-uf').innerText = `UF ${item.uf} | ${item.inquilino}`;
            };
            results.appendChild(div);
        });
        results.style.display = filtered.length > 0 ? 'block' : 'none';
    });

    const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
        initialView: 'dayGridMonth',
        locale: 'es',
        headerToolbar: { left: 'prev', center: 'title', right: 'next' },
        height: 'auto',
        dateClick: (info) => abrir(info.dateStr)
    });
    calendar.render();

    onSnapshot(collection(db, "reservas_salon"), (s) => {
        reservas = s.docs.map(d => ({id: d.id, ...d.data()}));
        calendar.setOption('events', reservas.map(r => ({
            title: r.inquilino,
            start: r.fecha,
            display: 'block'
        })));
    });

    function abrir(fecha) {
        window.selectedDate = fecha;
        document.getElementById('m-date').innerText = fecha.split('-').reverse().join('/');
        input.value = '';
        document.getElementById('selection-card').style.display = 'none';
        document.getElementById('btn-confirm').style.display = 'none';
        
        const res = reservas.find(r => r.fecha === fecha);
        if(res) {
            window.currentResId = res.id;
            window.currentResInfo = res;
            document.getElementById('ui-crear').style.display = 'none';
            document.getElementById('ui-ocupado').style.display = 'block';
            document.getElementById('info-reserva').innerText = res.inquilino;
        } else {
            document.getElementById('ui-crear').style.display = 'block';
            document.getElementById('ui-ocupado').style.display = 'none';
        }
        document.getElementById('modal').style.display = 'flex';
    }

    document.getElementById('btn-confirm').onclick = async () => {
        await addDoc(collection(db, "reservas_salon"), {
            fecha: window.selectedDate,
            uf: selUF.uf,
            inquilino: selUF.inquilino,
            tel: selUF.tel
        });
        window.open(`https://wa.me/5491131552679?text=*NUEVA RESERVA SUM*%0AFecha: ${window.selectedDate}%0AUF: ${selUF.uf}%0AInquilino: ${selUF.inquilino}`);
        closeM();
    };

    document.getElementById('btn-delete').onclick = async () => {
        if(prompt("CLAVE ADMINISTRADOR:") === MASTER_KEY) {
            const r = window.currentResInfo;
            await deleteDoc(doc(db, "reservas_salon", window.currentResId));
            window.open(`https://wa.me/5491131552679?text=*RESERVA CANCELADA*%0AFecha: ${r.fecha}%0AUF: ${r.uf}`);
            closeM();
        }
    };

    window.closeM = () => document.getElementById('modal').style.display = 'none';
    init();
</script>
</body>
</html>
