<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SUM PRO - Gestión</title>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
/* 🌌 BASE */
body{
margin:0;
font-family:-apple-system,sans-serif;
background: radial-gradient(circle at top,#0f2027,#0b141a);
color:#fff;
overflow-x: hidden;
}

/* 🏠 BOTÓN VOLVER AL HUB */
.btn-home {
    position: fixed;
    top: 15px;
    left: 15px;
    z-index: 9999999;
    background: rgba(37, 99, 235, 0.9);
    color: white;
    border: none;
    border-radius: 50%;
    width: 45px;
    height: 45px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
}

/* 📅 CALENDARIO */
#calendar{
height:calc(100vh - 20px);
margin:10px;
background:#111b21;
border-radius:15px;
padding:10px;
}

/* 🧊 MODAL */
.modal{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,.85);
backdrop-filter:blur(10px);
z-index:999999;
}

.modal-content{
width:90%;
max-width:380px;
padding:25px;
border-radius:20px;
background:rgba(28,39,46,0.9);
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 10px 50px rgba(0,0,0,1);
animation:fadeIn .25s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

.input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #2a3942;
background:#1a252c;
color:#fff;
margin-top:10px;
text-align:center;
box-sizing: border-box;
outline: none;
}

#results{
background:#1c272e;
border-radius:12px;
max-height:150px;
overflow-y:auto;
margin-top:5px;
border:1px solid #2a3942;
}

#results div{
padding:12px;
border-bottom:1px solid #2a3942;
cursor:pointer;
}

.btn{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
transition:.2s;
display: block;
text-align: center;
text-decoration: none;
box-sizing: border-box;
}

.btn:active{transform: scale(0.98);}

.blue{ background: linear-gradient(135deg,#00c6ff,#0072ff); color:#fff; }
.green{ background: linear-gradient(135deg,#25d366,#128c7e); color:#fff; }
.red{ background: linear-gradient(135deg,#ff5858,#ff2e2e); color:#fff; }
.gray{ background: #333; color:#bbb; }

.hidden { display: none !important; }

@media(max-width:480px){
#calendar{height:80vh;}
}
</style>
</head>

<body>

<a href="https://vectorescomprados-pixel.github.io/Gestion-de-Consorcios/" class="btn-home">
    <i class="fas fa-home"></i>
</a>

<div id="main-content">
    <div id="calendar"></div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="fecha-label" style="text-align: center; margin-top:0;"></h3>

        <div id="ui-search">
            <input id="search" class="input" placeholder="Buscar UF o Inquilino" autocomplete="off">
            <div id="results"></div>
            <button id="btn-clear-test" class="btn red" style="display:none">BORRAR PRUEBAS</button>
        </div>

        <div id="card" style="display:none">
            <p id="info-uf" style="text-align: center; font-size: 1.1em; background: #1a252c; padding: 10px; border-radius: 10px;"></p>
            
            <button id="btn-save" class="btn blue">GUARDAR RESERVA</button>
            <button id="btn-delete" class="btn red" style="display:none">CANCELAR RESERVA</button>
            <a id="btn-wa" class="btn green" style="display:none" target="_blank">NOTIFICAR POR WHATSAPP</a>
        </div>

        <button class="btn gray" onclick="cerrar()">Cerrar</button>
        
        </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, getDocs, doc, deleteDoc, updateDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const PHONE = "5491131552679"; 
const firebaseConfig = {
    apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo",
    authDomain: "gestionuf-remoto.firebaseapp.com",
    projectId: "gestionuf-remoto"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* [MODO COMENTARIO] LÓGICA DE LOGIN INTERNO
window.login = () => {
    const p = document.getElementById("login-pass").value;
    if(p === "1131552679") {
        localStorage.setItem("salon_auth", "true");
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("main-content").classList.remove("hidden");
    } else { alert("Clave incorrecta"); }
};

window.logout = () => {
    localStorage.removeItem("salon_auth");
    location.reload();
};

if(localStorage.getItem("salon_auth") === "true") {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("main-content").classList.remove("hidden");
}
*/

let dataUFs = [], reservas = [], selUF = null;

const formatFecha = (f) => {
    if(!f) return "";
    const [y,m,d] = f.split("-");
    return `${d}-${m}-${y.slice(2)}`;
};

/* INICIO: CARGAR DATOS */
const loadUFs = async () => {
    try {
        const snap = await getDocs(collection(db, "departamentos"));
        dataUFs = snap.docs.map(d => ({
            UF: d.data().UF || d.data().Unidad,
            Inquilino: d.data().Inquilino || "Sin Nombre"
        }));
    } catch (e) { console.error("Error cargando UFs", e); }
};
loadUFs();

/* CALENDARIO */
const cal = new FullCalendar.Calendar(document.getElementById('calendar'), {
    initialView: 'dayGridMonth',
    locale: 'es',
    firstDay: 1,
    headerToolbar: { left: 'prev,next', center: 'title', right: '' },
    dateClick: i => abrir(i.dateStr),
    eventClick: i => {
        i.jsEvent.preventDefault();
        abrir(i.event.startStr);
    }
});
cal.render();

/* ESCUCHA TIEMPO REAL */
onSnapshot(collection(db, "reservas_salon"), snap => {
    reservas = snap.docs.map(d => ({id: d.id, ...d.data()}));
    cal.setOption('events', reservas.map(r => ({
        title: `UF ${r.uf}`,
        start: r.fecha,
        backgroundColor: '#00a884',
        allDay: true
    })));
});

/* MODAL CONTROL */
window.abrir = (fecha) => {
    window.fechaSel = fecha;
    selUF = null;
    
    document.getElementById('modal').style.display = "flex";
    document.getElementById('fecha-label').innerText = formatFecha(fecha);
    document.getElementById('ui-search').style.display = "block";
    document.getElementById('card').style.display = "none";
    document.getElementById('btn-wa').style.display = "none";
    document.getElementById('btn-delete').style.display = "none";
    document.getElementById('btn-save').style.display = "block";
    document.getElementById('search').value = "";
    document.getElementById('results').innerHTML = "";
    document.getElementById('btn-clear-test').style.display = "none";

    const res = reservas.find(r => r.fecha === fecha);
    if(res) {
        window.modoEdit = true;
        window.idDoc = res.id;
        selUF = {UF: res.uf, Inquilino: res.inquilino};
        showReservaInfo();
        document.getElementById('btn-delete').style.display = "block";
        document.getElementById('btn-save').innerText = "ACTUALIZAR DATOS";
    } else {
        window.modoEdit = false;
        document.getElementById('btn-save').innerText = "GUARDAR RESERVA";
    }
};

window.cerrar = () => document.getElementById('modal').style.display = "none";

const showReservaInfo = () => {
    document.getElementById('ui-search').style.display = "none";
    document.getElementById('card').style.display = "block";
    document.getElementById('info-uf').innerText = `UF ${selUF.UF} - ${selUF.Inquilino}`;
};

// --- ACTUALIZAR HUB CENTRAL ---
async function actualizarHub(texto) {
    try {
        const ref = doc(db, "resumen_consorcio", "estado_actual");
        await updateDoc(ref, { proximo_evento: texto });
    } catch (e) { console.log("Hub no inicializado"); }
}

/* BUSCADOR Y FUNCIÓN BORRAR */
document.getElementById('search').oninput = e => {
    const v = e.target.value.toLowerCase().trim();
    const cont = document.getElementById('results');
    const btnTest = document.getElementById('btn-clear-test');
    
    cont.innerHTML = "";
    btnTest.style.display = (v === "borrar") ? "block" : "none";

    if(!v || v === "borrar") return;

    dataUFs.filter(u => u.Inquilino.toLowerCase().includes(v) || u.UF.toString().includes(v))
    .slice(0, 5)
    .forEach(u => {
        const d = document.createElement('div');
        d.innerText = `UF ${u.UF} - ${u.Inquilino}`;
        d.onclick = () => {
            selUF = u;
            showReservaInfo();
        };
        cont.appendChild(d);
    });
};

/* ACCIÓN: GUARDAR */
document.getElementById('btn-save').onclick = async () => {
    if(!selUF) return;
    try {
        const datos = {
            fecha: window.fechaSel,
            uf: selUF.UF,
            inquilino: selUF.Inquilino
        };

        if(window.modoEdit) {
            await updateDoc(doc(db, "reservas_salon", window.idDoc), datos);
        } else {
            await addDoc(collection(db, "reservas_salon"), datos);
        }

        // Sincronización con el Hub
        actualizarHub(`${formatFecha(window.fechaSel)} - UF ${selUF.UF}`);

        const msg = `*RESERVA SUM*\n📅 Fecha: ${formatFecha(window.fechaSel)}\n🏠 UF: ${selUF.UF}\n👤 Inquilino: ${selUF.Inquilino}\n✅ Estado: CONFIRMADA`;
        setWA(msg);
        alert("¡Éxito!");
    } catch(e) { alert("Error al guardar"); }
};

/* ACCIÓN: ELIMINAR */
document.getElementById('btn-delete').onclick = async () => {
    if(!confirm("¿Cancelar esta reserva?")) return;
    try {
        await deleteDoc(doc(db, "reservas_salon", window.idDoc));
        
        // Sincronización con el Hub al borrar
        actualizarHub("Sin reservas próximas");

        const msg = `*CANCELACIÓN SUM*\n📅 Fecha: ${formatFecha(window.fechaSel)}\n🏠 UF: ${selUF.UF}\n👤 Inquilino: ${selUF.Inquilino}\n❌ Estado: CANCELADA`;
        setWA(msg);
        document.getElementById('btn-delete').style.display = "none";
        document.getElementById('btn-save').style.display = "none";
        alert("Reserva Eliminada");
    } catch(e) { alert("Error al eliminar"); }
};

/* ACCIÓN: LIMPIAR PRUEBAS */
document.getElementById('btn-clear-test').onclick = async () => {
    if(!confirm("¿BORRAR TODAS LAS RESERVAS DEL SISTEMA? Esta acción no se puede deshacer.")) return;
    try {
        const snap = await getDocs(collection(db, "reservas_salon"));
        const batch = writeBatch(db);
        snap.docs.forEach(d => batch.delete(d.ref));
        await batch.commit();
        actualizarHub("Sin reservas próximas");
        alert("Sistema Limpio");
        cerrar();
    } catch(e) { alert("Error al limpiar"); }
};

function setWA(texto) {
    const btn = document.getElementById('btn-wa');
    btn.href = `https://wa.me/${PHONE}?text=${encodeURIComponent(texto)}`;
    btn.style.display = "block";
}

</script>
</body>
</html>
