<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SUM PRO</title>
    
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIlNVTSBQUk8iLAogICJzaG9ydF9uYW1lIjogIlNVTSBQUk8iLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzBiMTQxYSIsCiAgInRoZW1lX2NvbG9yIjogIzBiMTQxYSIKfQ==">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    
    <style>
        * { box-sizing: border-box; } /* Evita que los bordes agranden los cuadros */

        :root { 
            --bg: #0b141a; 
            --card: #111b21; 
            --blue: #2563eb; 
            --red: #e11d48; 
            --orange: #f59e0b; 
            --text: #e9edef;
            --border: #222d34;
        }

        body { 
            margin: 0; 
            background: var(--bg); 
            font-family: 'Segoe UI', sans-serif; 
            color: var(--text);
            overflow-x: hidden; /* Prohibido el scroll lateral */
            -webkit-tap-highlight-color: transparent;
        }

        /* HEADER AJUSTADO */
        .app-bar { 
            background: var(--card); 
            padding: 20px 10px; 
            border-bottom: 3px solid var(--blue);
            text-align: center;
            width: 100%;
        }
        .app-bar h1 { 
            margin: 5px 0 0 0; 
            color: #fff; 
            font-size: 20px; /* Tamaño optimizado para no romperse en pantallas chicas */
            font-weight: 900; 
            text-transform: uppercase;
        }

        /* CONTENEDOR FLEXIBLE */
        .container { 
            width: 100%; 
            padding: 8px; 
            max-width: 100vw; 
        }

        /* CALENDARIO AUTO-AJUSTABLE */
        #calendar { 
            background: var(--card); 
            border-radius: 12px; 
            border: 1px solid var(--border);
            width: 100%;
            max-width: 100%;
        }

        /* Ajuste de celdas para que no se estiren */
        .fc-daygrid-day-frame { overflow: hidden; }
        .fc-daygrid-day { min-height: 90px !important; }

        /* NOMBRES DENTRO DEL CALENDARIO */
        .fc-event {
            background: linear-gradient(145deg, #1e2a33, #111b21) !important;
            border: 1.5px solid var(--blue) !important;
            border-radius: 4px !important;
            margin: 1px !important;
            padding: 2px !important;
            display: block;
        }
        .fc-event-title { 
            font-size: 11px !important; /* Ajustado para que entre en el cuadrito */
            font-weight: 800 !important;
            white-space: normal !important; /* El nombre baja de renglón si es largo */
            text-align: center;
            word-wrap: break-word;
        }

        /* MODAL RESPONSIVO */
        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            display: none; align-items: center; justify-content: center; z-index: 1000; 
        }
        .modal-content { 
            background: var(--card); 
            width: 92%; /* Ajuste al ancho del cel */
            max-width: 380px; 
            padding: 20px; 
            border-radius: 20px; 
            border: 1px solid var(--border);
        }
        
        input[type="text"] { 
            width: 100%; height: 55px; background: #070d11; border: 1px solid #2a3942; border-radius: 10px; 
            color: white; padding: 0 15px; font-size: 16px; margin-top: 10px;
        }

        .btn { 
            width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: 900; 
            text-transform: uppercase; margin-top: 10px; font-size: 13px;
        }
        .btn-blue { background: var(--blue); color: white; }
        .btn-red { background: var(--red); color: white; }

        .results-list { background: #070d11; border: 1px solid #2a3942; border-radius: 8px; max-height: 150px; overflow-y: auto; }
        .result-item { padding: 15px; border-bottom: 1px solid #1c272e; font-size: 14px; }
        
        /* Ajustes para pantallas muy pequeñas (iPhone SE/5) */
        @media (max-width: 340px) {
            .app-bar h1 { font-size: 16px; }
            .fc-col-header-cell-cushion { font-size: 10px; }
            .fc-event-title { font-size: 9px !important; }
        }
    </style>
</head>
<body>

<div class="app-bar">
    <div style="color: #22c55e; font-size: 10px; font-weight: bold;">● TERMINAL MÓVIL OPTIMIZADA</div>
    <h1>SALÓN DE USOS MÚLTIPLES</h1>
</div>

<div class="container">
    <div id="calendar"></div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="m-title" style="margin:0; color:var(--blue); font-size: 14px;">GESTIÓN DE FECHA</h3>
        <p id="m-date" style="color:#556671; font-weight: bold; font-size: 18px; margin: 5px 0 15px 0;"></p>

        <div id="ui-crear">
            <input type="text" id="search-input" placeholder="BUSCAR DPTO O NOMBRE..." autocomplete="off">
            <div id="results" class="results-list" style="display:none"></div>
            
            <div id="selection-card" style="display:none; margin-top: 15px; padding: 15px; background: rgba(37,99,235,0.1); border-radius: 12px; border: 1px solid var(--blue);">
                <span id="label-uf" style="font-size: 18px; font-weight: 900; color: #fff; display: block; text-align: center;"></span>
            </div>
            <button class="btn btn-blue" id="btn-confirm" style="display:none">AGENDAR AHORA</button>
        </div>

        <div id="ui-ocupado" style="display:none">
            <div style="padding:15px; background: rgba(225,29,72,0.1); border-radius:12px; border: 1px solid var(--red); text-align: center;">
                <span id="info-reserva" style="font-size:18px; font-weight: 900; color: #fff;"></span>
            </div>
            <button class="btn btn-red" id="btn-delete">ELIMINAR REGISTRO</button>
        </div>

        <button class="btn" style="background:transparent; color:#556671" onclick="closeM()">CANCELAR</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
        authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto", 
        storageBucket: "gestionuf-remoto.firebasestorage.app", 
        messagingSenderId: "724452752860", 
        appId: "1:724452752860:web:4d25585addcdcbd146e319" 
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const MASTER_KEY = "1131552679";

    let dataUFs = []; 
    let reservas = [];
    let selUF = null;

    async function init() {
        const snap = await getDocs(collection(db, "departamentos"));
        dataUFs = snap.docs.map(d => ({
            uf: parseInt(d.data().UF || d.data().Unidad) || 0,
            inquilino: d.data().Inquilino || d.data().NombreInquilino || "",
            tel: d.data().TelefonoInquilino || ""
        }));
    }

    const input = document.getElementById('search-input');
    const results = document.getElementById('results');
    
    input.addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase().trim();
        results.innerHTML = '';
        if(val.length < 1) { results.style.display = 'none'; return; }
        
        let filtered = dataUFs.filter(item => 
            item.inquilino.toLowerCase().includes(val) || item.uf.toString().includes(val)
        ).sort((a,b) => a.uf - b.uf);

        filtered.forEach(item => {
            const div = document.createElement('div');
            div.className = 'result-item';
            div.innerHTML = `<b style="color:var(--orange)">UF ${item.uf}</b> - ${item.inquilino}`;
            div.onclick = () => {
                selUF = item;
                input.value = item.inquilino;
                results.style.display = 'none';
                document.getElementById('selection-card').style.display = 'block';
                document.getElementById('btn-confirm').style.display = 'block';
                document.getElementById('label-uf').innerText = `UF ${item.uf} | ${item.inquilino}`;
            };
            results.appendChild(div);
        });
        results.style.display = filtered.length > 0 ? 'block' : 'none';
    });

    const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
        initialView: 'dayGridMonth',
        locale: 'es',
        headerToolbar: { left: 'prev', center: 'title', right: 'next' },
        height: 'auto',
        dateClick: (info) => abrir(info.dateStr)
    });
    calendar.render();

    onSnapshot(collection(db, "reservas_salon"), (s) => {
        reservas = s.docs.map(d => ({id: d.id, ...d.data()}));
        calendar.setOption('events', reservas.map(r => ({
            title: r.inquilino,
            start: r.fecha,
            display: 'block'
        })));
    });

    function abrir(fecha) {
        window.selectedDate = fecha;
        document.getElementById('m-date').innerText = fecha.split('-').reverse().join(' / ');
        input.value = '';
        document.getElementById('selection-card').style.display = 'none';
        document.getElementById('btn-confirm').style.display = 'none';
        
        const res = reservas.find(r => r.fecha === fecha);
        if(res) {
            window.currentResId = res.id;
            window.currentResInfo = res;
            document.getElementById('ui-crear').style.display = 'none';
            document.getElementById('ui-ocupado').style.display = 'block';
            document.getElementById('info-reserva').innerText = res.inquilino;
        } else {
            document.getElementById('ui-crear').style.display = 'block';
            document.getElementById('ui-ocupado').style.display = 'none';
        }
        document.getElementById('modal').style.display = 'flex';
    }

    document.getElementById('btn-confirm').onclick = async () => {
        await addDoc(collection(db, "reservas_salon"), {
            fecha: window.selectedDate, uf: selUF.uf, inquilino: selUF.inquilino, tel: selUF.tel
        });
        window.open(`https://wa.me/5491131552679?text=*RESERVA SUM*%0AFecha: ${window.selectedDate}%0AUF: ${selUF.uf}%0AInquilino: ${selUF.inquilino}`);
        closeM();
    };

    document.getElementById('btn-delete').onclick = async () => {
        if(prompt("PASSWORD:") === MASTER_KEY) {
            const r = window.currentResInfo;
            await deleteDoc(doc(db, "reservas_salon", window.currentResId));
            window.open(`https://wa.me/5491131552679?text=*CANCELACIÓN SUM*%0AFecha: ${r.fecha}%0AUF: ${r.uf}`);
            closeM();
        }
    };

    window.closeM = () => document.getElementById('modal').style.display = 'none';
    init();
</script>
</body>
</html>
