<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SUM PRO - Producción Final</title>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<style>
* { box-sizing: border-box; }
body { margin:0; background:#0b141a; color:#fff; font-family:sans-serif; }
.container { padding:10px; }
#calendar { background:#111b21; border-radius:12px; padding:10px; height:85vh; }

.modal { position:fixed; inset:0; background:rgba(0,0,0,.9); display:none; align-items:center; justify-content:center; }
.modal-content { background:#1c272e; padding:20px; border-radius:20px; width:100%; max-width:360px; }

.input { width:100%; padding:15px; margin:10px 0; border-radius:10px; border:none; background:#222; color:#fff; }
.btn { width:100%; padding:15px; border:none; border-radius:10px; margin-top:10px; font-weight:bold; cursor:pointer; }
.blue { background:#00a884; color:#fff; }
.green { background:#25d366; color:#fff; }

#results div { padding:10px; border-bottom:1px solid #333; cursor:pointer; }
#preview { width:100%; max-height:150px; display:none; margin:10px 0; }
#loading { display:none; color:#00d2ff; }
</style>
</head>

<body>

<div class="container">
  <div id="calendar"></div>
</div>

<div id="modal" class="modal">
<div class="modal-content">

<h3 id="fecha-label"></h3>

<div id="ui-search">
<input id="search" class="input" placeholder="Buscar UF o Inquilino">
<div id="results"></div>
</div>

<div id="card" style="display:none">
<p id="info-uf"></p>

<img id="preview">

<input type="file" id="file-input">

<div id="loading">Subiendo...</div>

<button id="btn-procesar" class="btn blue">GUARDAR</button>
<a id="btn-wa" class="btn green" style="display:none" target="_blank">ENVIAR WHATSAPP</a>
</div>

<button class="btn" onclick="cerrar()">Cerrar</button>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyDx...",
  authDomain: "gestionuf-remoto.firebaseapp.com",
  projectId: "gestionuf-remoto"
});
const db = getFirestore(app);

const CLOUD_NAME = "dhryws88e";
const UPLOAD_PRESET = "ml_default";
const PHONE = "5491131552679";

let dataUFs=[], reservas=[], selUF=null, fotoBlob=null, modoReserva=true;

// cargar UF
(async ()=>{
  const snap = await getDocs(collection(db,"departamentos"));
  dataUFs = snap.docs.map(d=>({
    UF: d.data().UF || d.data().Unidad,
    Inquilino: d.data().Inquilino || "Sin Nombre"
  }));
})();

// calendario
const cal = new FullCalendar.Calendar(document.getElementById('calendar'),{
  initialView:'dayGridMonth',
  locale:'es',
  dateClick:i=>abrir(i.dateStr),
  eventClick:i=>abrir(i.event.startStr)
});
cal.render();

// realtime
onSnapshot(collection(db,"reservas_salon"), snap=>{
  reservas = snap.docs.map(d=>({id:d.id,...d.data()}));
  cal.setOption('events', reservas.map(r=>({
    title:"UF "+r.uf,
    start:r.fecha,
    backgroundColor:r.comprobanteUrl ? '#00a884' : '#e91e63'
  })));
});

// abrir modal
window.abrir = (fecha)=>{
  selUF=null; fotoBlob=null;
  window.fechaSel=fecha;

  document.getElementById('modal').style.display="flex";
  document.getElementById('fecha-label').innerText=fecha;

  const res = reservas.find(r=>r.fecha===fecha);
  if(res){
    modoReserva=false;
    window.idReserva=res.id;
    selUF={UF:res.uf,Inquilino:res.inquilino};
    document.getElementById('card').style.display="block";
    document.getElementById('info-uf').innerText=`UF ${res.uf} - ${res.inquilino}`;
  }else{
    modoReserva=true;
  }
};

window.cerrar=()=>document.getElementById('modal').style.display="none";

// FILE INPUT FIX 🔥
document.getElementById('file-input').onchange=(e)=>{
  const file = e.target.files[0]; // FIX REAL
  if(!file) return;

  const reader = new FileReader();
  reader.onload = ev=>{
    const img = new Image();
    img.onload = ()=>{
      const canvas=document.createElement('canvas');
      const max=900;
      let w=img.width,h=img.height;

      if(w>h && w>max){ h*=max/w; w=max; }
      if(h>w && h>max){ w*=max/h; h=max; }

      canvas.width=w;
      canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);

      canvas.toBlob(blob=>{
        fotoBlob = blob || file;

        const preview=document.getElementById('preview');
        preview.src=URL.createObjectURL(fotoBlob);
        preview.style.display="block";
      },'image/jpeg',0.7);
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
};

// buscar UF
document.getElementById('search').oninput=(e)=>{
  const v=e.target.value.toLowerCase();
  const cont=document.getElementById('results');
  cont.innerHTML="";

  dataUFs.filter(u=>u.Inquilino.toLowerCase().includes(v)||u.UF.toString().includes(v))
  .slice(0,5)
  .forEach(u=>{
    const d=document.createElement('div');
    d.innerText=`UF ${u.UF} - ${u.Inquilino}`;
    d.onclick=()=>{
      selUF=u;
      document.getElementById('card').style.display="block";
      document.getElementById('info-uf').innerText=d.innerText;
    };
    cont.appendChild(d);
  });
};

// guardar
document.getElementById('btn-procesar').onclick=async()=>{
  if(!selUF) return alert("Elegí UF");

  document.getElementById('loading').style.display="block";

  let url="";

  if(fotoBlob){
    const fd=new FormData();
    fd.append("file", fotoBlob);
    fd.append("upload_preset", UPLOAD_PRESET);

    try{
      const r=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{
        method:"POST",
        body:fd
      });

      const d=await r.json();
      console.log(d);

      if(d.error) throw new Error(d.error.message);
      if(!d.secure_url) throw new Error("Sin URL");

      url=d.secure_url;

    }catch(e){
      alert("Error nube: "+e.message);
      document.getElementById('loading').style.display="none";
      return;
    }
  }

  let msj="";

  if(modoReserva){
    await addDoc(collection(db,"reservas_salon"),{
      fecha:window.fechaSel,
      uf:selUF.UF,
      inquilino:selUF.Inquilino,
      comprobanteUrl:url
    });

    msj=`Reserva SUM\nUF ${selUF.UF}\n${selUF.Inquilino}\n${url}`;

  }else{
    await updateDoc(doc(db,"reservas_salon",window.idReserva),{
      comprobanteUrl:url
    });

    msj=`Pago actualizado\nUF ${selUF.UF}\n${url}`;
  }

  const btnWA=document.getElementById('btn-wa');
  btnWA.href=`https://wa.me/${PHONE}?text=${encodeURIComponent(msj)}`;
  btnWA.style.display="block";

  document.getElementById('loading').style.display="none";
  alert("Guardado OK");
};
</script>

</body>
</html>
