<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>SUM PRO - Unificado</title>
    
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Colores extraídos de tus capturas (Foto 3 y 5) */
        :root { 
            --bg: #0b141a; 
            --card: #111b21; 
            --blue: #2563eb; 
            --red: #e11d48; 
            --orange: #f59e0b; 
            --text: #e9edef;
            --border: #222d34;
        }

        body { 
            margin: 0; 
            background: var(--bg); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            color: var(--text);
        }

        /* Barra Superior Estilo App */
        .app-bar { 
            background: var(--card); 
            padding: 15px; 
            border-bottom: 2px solid var(--blue);
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .status-led { color: #22c55e; font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        /* Contenedor del Calendario */
        .container { padding: 8px; }
        #calendar { 
            background: var(--card); 
            border-radius: 12px; 
            border: 1px solid var(--border);
            padding: 5px;
        }

        /* Personalización de FullCalendar para máxima legibilidad */
        .fc { border: none !important; --fc-border-color: #222d34; }
        .fc-toolbar-title { font-size: 1.1em !important; color: var(--blue); font-weight: bold; }
        .fc-button-primary { background: var(--blue) !important; border: none !important; }
        
        /* Celdas de días */
        .fc-daygrid-day { min-height: 110px !important; background: var(--card); }
        .fc-day-today { background: rgba(37, 99, 235, 0.1) !important; }
        .fc-daygrid-day-number { 
            font-size: 14px; 
            font-weight: bold; 
            padding: 8px !important; 
            color: var(--text); 
        }

        /* NOMBRES DENTRO DE LOS CUADROS (Más grandes y legibles) */
        .fc-event {
            background: rgba(37, 99, 235, 0.2) !important;
            border: 1px solid var(--blue) !important;
            border-radius: 6px !important;
            padding: 4px !important;
            margin: 2px !important;
        }
        .fc-event-title { 
            display: block;
            font-size: 13px !important; /* Aumentado para legibilidad */
            font-weight: 800 !important;
            color: #fff !important;
            text-align: center;
            white-space: normal !important; /* Permite que el nombre baje de línea si es largo */
            line-height: 1.2;
        }

        /* Modales Estilo Cyber (Foto 4) */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(5px); }
        .modal-content { 
            background: var(--card); 
            width: 88%; 
            max-width: 400px; 
            padding: 25px; 
            border-radius: 15px; 
            border: 1px solid var(--border);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        
        .search-box input {
            width: 100%; height: 50px; background: #1a242b; border: 1px solid #333; border-radius: 8px; 
            color: white; padding: 0 15px; box-sizing: border-box; font-size: 16px; margin: 15px 0;
        }
        .results-list { background: #1a242b; border: 1px solid #333; border-radius: 8px; max-height: 150px; overflow-y: auto; }
        .result-item { padding: 12px; border-bottom: 1px solid #222; font-size: 14px; cursor: pointer; }
        .result-item:hover { background: var(--blue); }

        .btn { 
            width: 100%; padding: 16px; border-radius: 10px; border: none; font-weight: bold; 
            text-transform: uppercase; font-size: 12px; margin-top: 10px; cursor: pointer; color: white;
        }
        .btn-confirm { background: var(--blue); box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }
        .btn-delete { background: var(--red); box-shadow: 0 4px 15px rgba(225, 29, 72, 0.3); }
        .btn-cancel { background: #374151; }

        #debug { font-size: 9px; color: #444; text-align: center; margin-top: 15px; font-family: monospace; }
        
        /* Etiquetas de información en modal */
        .info-tag { font-size: 11px; color: var(--orange); font-weight: bold; margin-bottom: 5px; display: block; }
        .info-val { font-size: 18px; font-weight: bold; color: #fff; display: block; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="app-bar">
    <div class="status-led">● EN LÍNEA - SEGURIDAD ACTIVA</div>
    <h2 style="margin: 5px 0 0 0; font-size: 18px; letter-spacing: 1px;">SISTEMA DE RESERVAS</h2>
</div>

<div class="container">
    <div id="calendar"></div>
</div>

<div id="debug">Sincronizando con Firebase...</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="m-title" style="margin-top:0; color:var(--blue); text-transform: uppercase; font-size: 16px;">Gestión de Turno</h3>
        <p id="m-date" style="color:#888; font-size:14px; margin-bottom: 20px;"></p>

        <div id="ui-crear">
            <span class="info-tag">BUSCAR POR DPTO O NOMBRE:</span>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Ej: 24A o Perez..." autocomplete="off">
                <div id="results" class="results-list" style="display:none"></div>
            </div>
            <div id="selection-card" style="display:none; background: rgba(37,99,235,0.1); padding:15px; border-radius:8px; border: 1px solid var(--blue); margin-bottom: 15px;">
                <span class="info-tag">SELECCIONADO:</span>
                <span id="label-uf" class="info-val" style="margin-bottom:0"></span>
            </div>
            <button class="btn btn-confirm" id="btn-confirm" style="display:none">CONFIRMAR Y AVISAR</button>
        </div>

        <div id="ui-ocupado" style="display:none">
            <span class="info-tag">DÍA OCUPADO POR:</span>
            <span id="info-reserva" class="info-val"></span>
            <button class="btn btn-delete" id="btn-delete">ELIMINAR ESTA RESERVA</button>
        </div>

        <button class="btn btn-cancel" onclick="closeM()">VOLVER</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
        authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto", 
        storageBucket: "gestionuf-remoto.firebasestorage.app", 
        messagingSenderId: "724452752860", 
        appId: "1:724452752860:web:4d25585addcdcbd146e319" 
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const ADMIN_TEL = "5491131552679";
    const MASTER_KEY = "1131552679";

    let dataUFs = []; 
    let reservas = [];
    let selUF = null;

    async function init() {
        const snap = await getDocs(collection(db, "departamentos"));
        dataUFs = snap.docs.map(d => ({
            uf: parseInt(d.data().UF || d.data().Unidad) || 0,
            inquilino: d.data().Inquilino || d.data().NombreInquilino || "",
            tel: d.data().TelefonoInquilino || ""
        }));
        document.getElementById('debug').innerText = "CONECTADO A FIREBASE";
    }

    const input = document.getElementById('search-input');
    const results = document.getElementById('results');
    
    input.addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase().trim();
        results.innerHTML = '';
        if(val.length < 1) { results.style.display = 'none'; return; }
        
        let filtered = dataUFs.filter(item => 
            item.inquilino.toLowerCase().includes(val) || item.uf.toString().includes(val)
        ).sort((a,b) => a.uf - b.uf);

        filtered.forEach(item => {
            const div = document.createElement('div');
            div.className = 'result-item';
            div.innerHTML = `<span style="color:var(--orange); font-weight:bold">UF ${item.uf}</span> - ${item.inquilino}`;
            div.onclick = () => {
                selUF = item;
                input.value = item.inquilino;
                results.style.display = 'none';
                document.getElementById('selection-card').style.display = 'block';
                document.getElementById('btn-confirm').style.display = 'block';
                document.getElementById('label-uf').innerText = `UF ${item.uf} | ${item.inquilino}`;
            };
            results.appendChild(div);
        });
        results.style.display = filtered.length > 0 ? 'block' : 'none';
    });

    const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
        initialView: 'dayGridMonth',
        locale: 'es',
        headerToolbar: { left: 'prev', center: 'title', right: 'next' },
        height: 'auto',
        dateClick: (info) => abrir(info.dateStr)
    });
    calendar.render();

    onSnapshot(collection(db, "reservas_salon"), (s) => {
        reservas = s.docs.map(d => ({id: d.id, ...d.data()}));
        calendar.setOption('events', reservas.map(r => ({
            title: r.inquilino, // Nombre grande en el cuadro
            start: r.fecha,
            display: 'block'
        })));
    });

    function abrir(fecha) {
        window.selectedDate = fecha;
        document.getElementById('m-date').innerText = "FECHA SELECCIONADA: " + fecha;
        input.value = '';
        document.getElementById('selection-card').style.display = 'none';
        document.getElementById('btn-confirm').style.display = 'none';
        
        const res = reservas.find(r => r.fecha === fecha);
        if(res) {
            window.currentResId = res.id;
            window.currentResInfo = res;
            document.getElementById('ui-crear').style.display = 'none';
            document.getElementById('ui-ocupado').style.display = 'block';
            document.getElementById('info-reserva').innerText = `${res.inquilino} (UF ${res.uf})`;
        } else {
            document.getElementById('ui-crear').style.display = 'block';
            document.getElementById('ui-ocupado').style.display = 'none';
        }
        document.getElementById('modal').style.display = 'flex';
    }

    document.getElementById('btn-confirm').onclick = async () => {
        await addDoc(collection(db, "reservas_salon"), {
            fecha: window.selectedDate,
            uf: selUF.uf,
            inquilino: selUF.inquilino,
            tel: selUF.tel
        });
        window.open(`https://wa.me/${ADMIN_TEL}?text=*NUEVA RESERVA SUM*%0AFecha: ${window.selectedDate}%0AUF: ${selUF.uf}%0AInquilino: ${selUF.inquilino}`);
        closeM();
    };

    document.getElementById('btn-delete').onclick = async () => {
        if(prompt("INGRESE CLAVE MAESTRA:") === MASTER_KEY) {
            const r = window.currentResInfo;
            await deleteDoc(doc(db, "reservas_salon", window.currentResId));
            window.open(`https://wa.me/${ADMIN_TEL}?text=*CANCELACIÓN SUM*%0AFecha: ${r.fecha}%0AUF: ${r.uf}%0AInquilino: ${r.inquilino}`);
            closeM();
        }
    };

    window.closeM = () => document.getElementById('modal').style.display = 'none';
    init();
</script>
</body>
</html>
