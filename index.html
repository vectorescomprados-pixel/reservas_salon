<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Reserva SUM Interactivo</title>
    
    <!-- FullCalendar CSS -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg: #0b141a; --card: #111b21; --primary: #2563eb; --text: #e9edef; --border: #222d34; --success: #22c55e; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        
        .header { text-align: center; padding: 15px; background: var(--card); border-bottom: 3px solid var(--primary); border-radius: 10px; margin-bottom: 20px; }
        
        /* Estilos del Calendario */
        #calendar { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--border); max-width: 600px; margin: 0 auto; }
        .fc-header-toolbar { font-size: 0.8em; }
        .fc-daygrid-day { cursor: pointer; }
        .fc-daygrid-day:hover { background: rgba(37, 99, 235, 0.1); }

        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 350px; border: 1px solid var(--border); }
        .hidden { display: none; }
        
        input, select { width: 100%; height: 45px; margin: 10px 0; border-radius: 10px; border: 1px solid var(--border); background: #1a242b; color: #fff; padding: 0 10px; }
        .btn { width: 100%; height: 45px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .primary { background: var(--primary); }
        .danger { background: #e11d48; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0; font-size:18px;">SUM - RESERVAS</h2>
    <small style="color:var(--success)">Toca un día para reservar</small>
</div>

<div id="calendar"></div>

<!-- Modal de Reserva -->
<div id="modal-reserva" class="modal hidden">
    <div class="modal-content">
        <h3 id="fecha-sel" style="color:var(--primary); margin-top:0"></h3>
        <label>Seleccionar Unidad (UF):</label>
        <select id="select-uf">
            <option value="">Cargando UFs...</option>
        </select>
        <div id="info-uf" style="font-size: 12px; color: #8a96a3; margin-bottom: 10px;"></div>
        
        <button id="btn-confirmar" class="btn primary">
            <i class="fab fa-whatsapp"></i> CONFIRMAR Y AVISAR
        </button>
        <button onclick="cerrarModal()" class="btn danger">CANCELAR</button>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, getDocs, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
        authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto", 
        storageBucket: "gestionuf-remoto.firebasestorage.app", 
        messagingSenderId: "724452752860", 
        appId: "1:724452752860:web:4d25585addcdcbd146e319" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // --- CONFIGURACIÓN ---
    const MI_WHATSAPP = "5491131552679"; // Tu número donde recibirás el aviso
    let directorio = {};
    let fechaSeleccionada = "";

    // Cargar Directorio de UFs y Teléfonos
    async function cargarUFs() {
        const snap = await getDocs(collection(db, "departamentos"));
        const select = document.getElementById("select-uf");
        select.innerHTML = '<option value="">Elegir UF...</option>';
        
        snap.forEach(doc => {
            const d = doc.data();
            directorio[d.UF] = d.TelefonoInquilino || "Sin teléfono";
            const opt = document.createElement("option");
            opt.value = d.UF;
            opt.innerText = `Unidad ${d.UF}`;
            select.appendChild(opt);
        });
    }

    // Inicializar Calendario
    const calendarEl = document.getElementById('calendar');
    const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'es',
        headerToolbar: { left: 'prev,next', center: 'title', right: '' },
        dateClick: function(info) {
            fechaSeleccionada = info.dateStr;
            document.getElementById("fecha-sel").innerText = info.dateStr;
            document.getElementById("modal-reserva").classList.remove("hidden");
        },
        events: [] // Se cargarán desde Firebase
    });
    calendar.render();

    // Escuchar Reservas en tiempo real
    onSnapshot(collection(db, "reservas_salon"), (snap) => {
        const evts = snap.docs.map(doc => ({
            title: `UF ${doc.data().uf}`,
            start: doc.data().fecha,
            color: '#e11d48'
        }));
        calendar.setOption('events', evts);
    });

    // Confirmar Reserva
    document.getElementById("btn-confirmar").onclick = async () => {
        const uf = document.getElementById("select-uf").value;
        if(!uf) return alert("Selecciona una UF");

        const telInquilino = directorio[uf];
        
        try {
            // 1. Guardar en Firebase
            await addDoc(collection(db, "reservas_salon"), {
                fecha: fechaSeleccionada,
                uf: uf,
                telefono: telInquilino,
                creadoEl: new Date()
            });

            // 2. Disparar WhatsApp
            const mensaje = `*Nueva Reserva SUM*%0A📅 Fecha: ${fechaSeleccionada}%0A🏢 Unidad: ${uf}%0A📱 Tel. Inquilino: ${telInquilino}`;
            const url = `https://wa.me/${MI_WHATSAPP}?text=${mensaje}`;
            
            window.open(url, '_blank');
            cerrarModal();
        } catch (e) { alert("Error al guardar"); }
    };

    window.cerrarModal = () => document.getElementById("modal-reserva").classList.add("hidden");
    
    cargarUFs();
</script>
</body>
</html>
