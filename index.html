<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icono.png">
    <link rel="icon" type="image/png" href="icono.png">
    <link rel="manifest" id="manifest-placeholder">
    <title>SUM PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        :root { --bg: #0b141a; --card: #1c272e; --blue: #1d6ed7; --red: #e91e63; --text: #e9edef; --border: #2a3942; }
        
        body { margin: 0; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: var(--text); overflow-x: hidden; }
        
        .app-bar { background: #111b21; padding: 30px 10px 15px 10px; border-bottom: 3px solid var(--blue); text-align: center; }
        .app-bar h1 { margin: 5px 0 0 0; color: #fff; font-size: 22px; font-weight: 900; text-transform: uppercase; }

        .container { width: 100%; padding: 10px; }
        #calendar { background: #111b21; border-radius: 15px; border: 1px solid var(--border); overflow: hidden; }
        
        /* CALENDARIO VISIBLE */
        .fc-daygrid-day-number { color: #ffffff !important; font-weight: 800 !important; font-size: 15px !important; text-decoration: none !important; }
        .fc-col-header-cell-cushion { color: #00d2ff !important; font-weight: 900 !important; text-transform: uppercase; }

        /* MODALES GENERALES */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 15px; backdrop-filter: blur(4px); }
        .modal-content { background: var(--card); width: 100%; max-width: 360px; padding: 30px; border-radius: 28px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #32444e; }
        
        /* ESTILO DE INPUTS TIPO FOTO */
        .input-styled { width: 100%; height: 55px; background: #222e35; border: 1px solid #32444e; border-radius: 12px; color: white; padding: 0 15px; font-size: 16px; margin: 15px 0; outline: none; text-align: center; }
        .input-styled::placeholder { color: #8696a0; }

        /* BOTONES SEGÚN LA FOTO */
        .row { display: flex; gap: 10px; margin-top: 10px; }
        .btn { flex: 1; height: 50px; border-radius: 12px; border: none; font-weight: 700; text-transform: uppercase; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-red { background: var(--red); color: white; }
        .btn-ghost { background: transparent; color: #8696a0; border: 1px solid #32444e; }

        /* BUSCADOR RESULTADOS */
        .results-list { background: #111b21; border-radius: 10px; max-height: 150px; overflow-y: auto; margin-top: 5px; }
        .result-item { padding: 15px; border-bottom: 1px solid #2a3942; font-size: 15px; text-align: left; }
    </style>
</head>
<body>

<div class="app-bar">
    <div style="color: #22c55e; font-size: 10px; font-weight: bold;">● SEGURIDAD ACTIVA</div>
    <h1>SALÓN DE USOS MÚLTIPLES</h1>
</div>

<div class="container">
    <div id="calendar"></div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="m-date" style="margin:0; color:#fff; font-size: 22px; font-weight: 800;"></h3>
        
        <div id="ui-crear">
            <input type="text" id="search-input" class="input-styled" placeholder="Buscar Unidad o Apellido..." autocomplete="off">
            <div id="results" class="results-list" style="display:none"></div>
            <div id="selection-card" style="display:none; margin: 15px 0; padding: 15px; background: rgba(29,110,215,0.1); border-radius: 12px; border: 1px solid var(--blue);">
                <span id="label-uf" style="font-weight: 900; color: #fff;"></span>
            </div>
            <button class="btn btn-blue" id="btn-confirm" style="display:none; width:100%">Confirmar y Avisar</button>
        </div>

        <div id="ui-ocupado" style="display:none">
            <div style="margin: 20px 0; padding:20px; background: rgba(233,30,99,0.05); border-radius:15px; border: 1px solid #443339;">
                <span id="info-reserva" style="font-size:18px; font-weight: 800; color: #fff;"></span>
            </div>
            <button class="btn btn-red" style="width:100%" onclick="abrirSeguridad()">Eliminar Reserva</button>
        </div>

        <button class="btn btn-ghost" style="width:100%; margin-top:10px" onclick="closeM()">Volver</button>
    </div>
</div>

<div id="modal-seguridad" class="modal">
    <div class="modal-content">
        <h2 style="margin:0; color:#fff; font-size: 20px; font-weight: 700;">Seguridad Requerida</h2>
        <p id="seg-desc" style="color:#8696a0; font-size: 14px; margin-top: 8px;"></p>
        
        <input type="password" id="admin-pass" class="input-styled" placeholder="Clave Administrativa">
        
        <div class="row">
            <button class="btn btn-blue" id="btn-autorizar">AUTORIZAR</button>
            <button class="btn btn-red" onclick="cerrarSeguridad()">VOLVER</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
        authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto", 
        storageBucket: "gestionuf-remoto.firebasestorage.app", 
        messagingSenderId: "724452752860", 
        appId: "1:724452752860:web:4d25585addcdcbd146e319" 
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const MASTER_KEY = "1131552679";
    const formatFechaLegible = (f) => f ? f.split('-').reverse().join('-') : "";

    // MANIFEST PWA
    const myManifest = { "name": "SUM PRO", "short_name": "SUM PRO", "start_url": ".", "display": "standalone", "background_color": "#0b141a", "theme_color": "#0b141a", "icons": [{ "src": "icono.png", "sizes": "512x512", "type": "image/png" }] };
    document.querySelector('#manifest-placeholder').setAttribute('href', URL.createObjectURL(new Blob([JSON.stringify(myManifest)], {type: 'application/json'})));

    let dataUFs = []; let reservas = []; let selUF = null;

    async function init() {
        const snap = await getDocs(collection(db, "departamentos"));
        dataUFs = snap.docs.map(d => ({ uf: parseInt(d.data().UF || d.data().Unidad) || 0, inquilino: d.data().Inquilino || d.data().NombreInquilino || "", tel: d.data().TelefonoInquilino || "" }));
    }

    const input = document.getElementById('search-input');
    const results = document.getElementById('results');
    
    input.addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase().trim();
        results.innerHTML = '';
        if(val.length < 1) { results.style.display = 'none'; return; }
        let filtered = dataUFs.filter(item => item.inquilino.toLowerCase().includes(val) || item.uf.toString().includes(val)).sort((a,b) => a.uf - b.uf);
        filtered.forEach(item => {
            const div = document.createElement('div');
            div.className = 'result-item';
            div.innerHTML = `<b style="color:var(--blue)">UF ${item.uf}</b> - ${item.inquilino}`;
            div.onclick = () => { 
                selUF = item; input.value = item.inquilino; results.style.display = 'none';
                document.getElementById('selection-card').style.display = 'block';
                document.getElementById('btn-confirm').style.display = 'block';
                document.getElementById('label-uf').innerText = `UF ${item.uf} | ${item.inquilino}`;
            };
            results.appendChild(div);
        });
        results.style.display = filtered.length > 0 ? 'block' : 'none';
    });

    const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
        initialView: 'dayGridMonth', locale: 'es', height: 'auto',
        headerToolbar: { left: 'prev', center: 'title', right: 'next' },
        dateClick: (info) => abrir(info.dateStr)
    });
    calendar.render();

    onSnapshot(collection(db, "reservas_salon"), (s) => {
        reservas = s.docs.map(d => ({id: d.id, ...d.data()}));
        calendar.setOption('events', reservas.map(r => ({ title: r.inquilino, start: r.fecha, display: 'block' })));
    });

    function abrir(fecha) {
        window.selectedDate = fecha;
        document.getElementById('m-date').innerText = formatFechaLegible(fecha);
        input.value = '';
        document.getElementById('selection-card').style.display = 'none';
        document.getElementById('btn-confirm').style.display = 'none';
        const res = reservas.find(r => r.fecha === fecha);
        if(res) {
            window.currentResId = res.id;
            window.currentResInfo = res;
            document.getElementById('ui-crear').style.display = 'none';
            document.getElementById('ui-ocupado').style.display = 'block';
            document.getElementById('info-reserva').innerText = `UF ${res.uf} - ${res.inquilino}`;
        } else {
            document.getElementById('ui-crear').style.display = 'block';
            document.getElementById('ui-ocupado').style.display = 'none';
        }
        document.getElementById('modal').style.display = 'flex';
    }

    // LÓGICA DE BORRADO ESTILO FOTO
    window.abrirSeguridad = () => {
        document.getElementById('seg-desc').innerText = `¿Borrar registro UF ${window.currentResInfo.uf}?`;
        document.getElementById('admin-pass').value = '';
        document.getElementById('modal-seguridad').style.display = 'flex';
    };

    window.cerrarSeguridad = () => document.getElementById('modal-seguridad').style.display = 'none';

    document.getElementById('btn-autorizar').onclick = async () => {
        const pass = document.getElementById('admin-pass').value;
        if(pass === MASTER_KEY) {
            const r = window.currentResInfo;
            await deleteDoc(doc(db, "reservas_salon", window.currentResId));
            window.open(`https://wa.me/549${MASTER_KEY}?text=*CANCELACIÓN SUM*%0AFecha: ${formatFechaLegible(r.fecha)}%0AUF: ${r.uf}`);
            cerrarSeguridad();
            closeM();
        } else {
            alert("Clave administrativa incorrecta");
        }
    };

    document.getElementById('btn-confirm').onclick = async () => {
        await addDoc(collection(db, "reservas_salon"), { fecha: window.selectedDate, uf: selUF.uf, inquilino: selUF.inquilino, tel: selUF.tel });
        window.open(`https://wa.me/549${MASTER_KEY}?text=*RESERVA SUM*%0AFecha: ${formatFechaLegible(window.selectedDate)}%0AUF: ${selUF.uf}%0AInquilino: ${selUF.inquilino}`);
        closeM();
    };

    window.closeM = () => document.getElementById('modal').style.display = 'none';
    init();
</script>
</body>
</html>
