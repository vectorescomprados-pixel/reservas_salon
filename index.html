<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SUM PRO</title>

  <!-- FullCalendar JS + CSS -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css">

  <style>
    /* 🌌 BASE */
    body{
      margin:0;
      font-family:-apple-system,sans-serif;
      background: radial-gradient(circle at top,#0f2027,#0b141a);
      color:#fff;
    }

    /* 📅 CALENDARIO */
    #calendar{
      height:calc(100vh - 20px);
      margin:10px;
      background:#111b21;
      border-radius:15px;
      padding:10px;
    }

    /* 🧊 MODAL */
    .modal{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.7);
      backdrop-filter:blur(10px);
      z-index:999999;
    }

    /* 🪟 CARD */
    .modal-content{
      width:95%;
      max-width:380px;
      padding:25px;
      border-radius:20px;

      background:rgba(28,39,46,0.7);
      backdrop-filter:blur(15px);

      border:1px solid rgba(255,255,255,0.08);
      box-shadow:0 10px 40px rgba(0,0,0,0.6);

      animation:fadeIn .25s ease;

      /* ✅ Responsive: evita que la foto rompa el modal */
      max-height:90vh;
      overflow:auto;
    }

    /* ✨ ANIMACIÓN */
    @keyframes fadeIn{
      from{opacity:0; transform:translateY(20px);}
      to{opacity:1; transform:translateY(0);}
    }

    /* 🔤 INPUT */
    .input{
      width:100%;
      padding:14px;
      border-radius:12px;
      border:none;
      background:#1a252c;
      color:#fff;
      margin-top:10px;
      text-align:center;
      box-sizing:border-box;
    }

    /* 📋 RESULTADOS */
    #results{
      background:#1c272e;
      border-radius:12px;
      max-height:150px;
      overflow-y:auto;
      margin-top:5px;
      border:1px solid #2a3942;
    }

    #results div{
      padding:12px;
      border-bottom:1px solid #2a3942;
      cursor:pointer;
      transition:.2s;
    }
    #results div:hover{
      background:#00a88433;
    }

    /* 🔘 BOTONES */
    .btn{
      width:100%;
      padding:14px;
      margin-top:12px;
      border:none;
      border-radius:12px;
      font-weight:bold;
      cursor:pointer;
      transition:.25s;
      box-sizing:border-box;
    }

    .blue{
      background:linear-gradient(135deg,#00c6ff,#0072ff);
      color:#fff;
    }
    .blue:hover{transform:scale(1.03);}

    .green{
      background:linear-gradient(135deg,#25d366,#128c7e);
      color:#fff;
    }

    .red{
      background:linear-gradient(135deg,#ff5858,#ff2e2e);
      color:#fff;
    }

    /* 📷 IMG (✅ más responsive) */
    #preview{
      width:100%;
      height:auto;
      max-height:40vh; /* se adapta a la pantalla */
      display:none;
      margin-top:10px;
      border-radius:10px;
      border:2px solid #00a884;
      object-fit:contain;
    }

    /* ⏳ */
    #loading{
      display:none;
      margin:10px 0;
      color:#00d2ff;
      font-weight:bold;
    }

    /* 📱 MOBILE */
    @media(max-width:480px){
      #calendar{height:75vh;margin:5px;padding:5px;}
      .modal-content{padding:20px;border-radius:16px;}
      .btn{font-size:14px;padding:13px;}
    }
  </style>
</head>

<body>
  <div id="calendar"></div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <h3 id="fecha-label"></h3>

      <div id="ui-search">
        <input id="search" class="input" placeholder="Buscar UF o Inquilino">
        <div id="results"></div>

        <!-- ✅ Botón aparece solo si escribís "borrar" -->
        <button id="btn-borrar-pruebas" class="btn red" style="display:none">
          BORRAR PRUEBAS
        </button>
      </div>

      <div id="card" style="display:none">
        <p id="info-uf"></p>

        <!-- ✅ Switch PRUEBA (se puede ocultar/mostrar con el buscador) -->
        <div id="wrap-prueba" style="margin-top:10px;padding:12px;border:1px solid #2a3942;border-radius:12px;background:#1a252c;">
          <label style="display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;">
            <span>Marcar como PRUEBA</span>
            <input type="checkbox" id="switch-prueba" style="transform:scale(1.2);">
          </label>
          <small style="display:block;opacity:.75;margin-top:6px;">

          </small>

          <input type="file" id="file-input" accept="image/*" style="display:none">
        </label>

        <img id="preview">

        <div id="loading">Subiendo...</div>

        <button id="btn-procesar" class="btn blue">GUARDAR</button>
        <a id="btn-wa" class="btn green" style="display:none" target="_blank">WHATSAPP</a>
      </div>

      <button class="btn" onclick="cerrar()">Cerrar</button>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

      getFirestore,

      onSnapshot,

    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    /* 🔥 FECHA */
    function formatFecha(f){
      const [y,m,d]=f.split("-");
      return `${d}-${m}-${y.slice(2)}`;
    }

    /* ✅ Compresión de imagen (reduce tamaño real subido a Cloudinary) */
    async function compressImage(file, {
      maxSize = 1600,
      quality = 0.75,
      mimeType = "image/jpeg"
    } = {}) {
      try{
        const bitmap = await createImageBitmap(file);

        let { width, height } = bitmap;

        // Si ya es chica, no tocar
        if (width <= maxSize && height <= maxSize) return file;

        const scale = Math.min(maxSize / width, maxSize / height);
        const newW = Math.round(width * scale);
        const newH = Math.round(height * scale);

        const canvas = document.createElement("canvas");
        canvas.width = newW;
        canvas.height = newH;

        const ctx = canvas.getContext("2d", { alpha: false });
        ctx.drawImage(bitmap, 0, 0, newW, newH);

        const blob = await new Promise((resolve) => {
          canvas.toBlob((b) => resolve(b), mimeType, quality);
        });

        return blob || file;
      }catch(err){
        // Fallback: si el dispositivo/navegador falla, sube la original
        console.warn("Compresión no disponible, se sube original:", err);
        return file;
      }
    }

    /* FIREBASE */
    const app = initializeApp({
      apiKey:"AIzaSyDx...",          // <- tu config real
      authDomain:"gestionuf-remoto.firebaseapp.com",
      projectId:"gestionuf-remoto"
    });
    const db = getFirestore(app);

    /* CLOUDINARY */
    const CLOUD_NAME="dhryws88e";
    const UPLOAD_PRESET="ml_default";
    const PHONE="5491131552679";

    let dataUFs=[], reservas=[], selUF=null, foto=null;
    let switchPruebaVisible = true;

    // UI refs
    const modal = document.getElementById("modal");
    const fechaLabel = document.getElementById("fecha-label");
    const uiSearch = document.getElementById("ui-search");
    const searchInput = document.getElementById("search");
    const results = document.getElementById("results");

    const btnBorrarPruebas = document.getElementById("btn-borrar-pruebas");

    const card = document.getElementById("card");
    const infoUf = document.getElementById("info-uf");

    const wrapPrueba = document.getElementById("wrap-prueba");
    const switchPrueba = document.getElementById("switch-prueba");

    const fileInput = document.getElementById("file-input");
    const preview = document.getElementById("preview");
    const loading = document.getElementById("loading");

    const btnProcesar = document.getElementById("btn-procesar");
    const btnWa = document.getElementById("btn-wa");

    /* CARGAR UFs */
    (async()=>{
      const snap = await getDocs(collection(db,"departamentos"));
      dataUFs = snap.docs.map(d=>({
        UF: d.data().UF || d.data().Unidad,
        Inquilino: d.data().Inquilino || "Sin Nombre"
      }));
    })();

    /* CALENDAR */
    const cal=new FullCalendar.Calendar(document.getElementById('calendar'),{
      initialView:'dayGridMonth',
      locale:'es',
      dateClick:i=>abrir(i.dateStr),
      eventClick:i=>abrir(i.event.startStr)
    });
    cal.render();

    /* REALTIME */
    onSnapshot(collection(db,"reservas_salon"), snap=>{
      reservas = snap.docs.map(d=>({id:d.id,...d.data()}));
      cal.setOption('events', reservas.map(r=>({
        title:`UF ${r.uf} • ${r.fechaVisual||formatFecha(r.fecha)}`,
        start:r.fecha,
        backgroundColor:r.comprobanteUrl ? '#00a884' : '#e91e63'
      })));
    });

    function esDocDePrueba(r){
      const uf = (r.uf ?? "").toString().toLowerCase();
      const inq = (r.inquilino ?? "").toString().toLowerCase();
      return r.esPrueba === true || uf.includes("test") || uf.includes("prueba") || inq.includes("test") || inq.includes("prueba");
    }

    /* ABRIR */
    window.abrir = (fecha)=>{
      window.fechaSel=fecha;
      selUF=null;
      foto=null;

      modal.style.display="flex";
      fechaLabel.innerText=formatFecha(fecha);

      uiSearch.style.display="block";
      card.style.display="none";
      btnWa.style.display="none";
      btnBorrarPruebas.style.display="none";

      // ✅ Reset visual de foto (evita que quede pegada la anterior)
      preview.src = "";
      preview.style.display = "none";
      fileInput.value = "";

      const res = reservas.find(r=>r.fecha===fecha);

      if(res){
        window.modo=false;
        window.id=res.id;
        selUF={UF:res.uf,Inquilino:res.inquilino};

        uiSearch.style.display="none";
        card.style.display="block";
        infoUf.innerText=`UF ${res.uf} - ${res.inquilino}`;

        // Switch: mostrar estado, pero bloquear edición (tu update no lo cambia)
        wrapPrueba.style.display = switchPruebaVisible ? "block" : "none";
        switchPrueba.checked = !!res.esPrueba;
        switchPrueba.disabled = true;
      }else{
        window.modo=true;

        // En alta nueva: habilitado
        wrapPrueba.style.display = switchPruebaVisible ? "block" : "none";
        switchPrueba.checked = false;
        switchPrueba.disabled = false;
      }
    };

    window.cerrar = ()=> modal.style.display="none";

    /* BUSCADOR + COMANDOS */
    searchInput.oninput = e=>{
      const v = e.target.value.trim().toLowerCase();
      results.innerHTML="";

      // Comando: borrar
      if(v === "borrar"){
        btnBorrarPruebas.style.display = "block";
        return;
      }else{
        btnBorrarPruebas.style.display = "none";
      }

      // Comando: ocultar switch
      if(v === "ocultar"){
        switchPruebaVisible = false;
        wrapPrueba.style.display = "none";
        return;
      }

      // Comando: mostrar switch
      if(v === "
