<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>SUM Pro - Gestión de Reservas</title>
    
    <!-- Librerías Externas -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --bg: #0b141a; --card: #111b21; --primary: #2563eb; 
            --danger: #e11d48; --text: #e9edef; --border: #222d34; 
            --success: #22c55e; --ghost: #374151; 
        }

        body { 
            margin: 0; padding: 0; background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', sans-serif; overscroll-behavior-y: contain;
        }
        
        .wrap { width: 95%; max-width: 450px; margin: 0 auto; padding-bottom: 30px; }

        /* Cabecera Estilo App Anterior */
        .main-header { 
            background: var(--card); padding: 15px; border-bottom: 3px solid var(--primary); 
            border-radius: 0 0 20px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            margin-bottom: 15px; position: sticky; top:0; z-index:100; 
        }
        
        /* Calendario Custom */
        #calendar { 
            background: var(--card); border-radius: 15px; padding: 10px; 
            border: 1px solid var(--border); font-size: 0.85em;
        }
        .fc .fc-toolbar-title { font-size: 1.1em; color: var(--primary); font-weight: bold; text-transform: uppercase; }
        .fc .fc-button-primary { background: var(--ghost); border: none; font-size: 0.8em; font-weight: bold; }
        .fc .fc-button-primary:disabled { background: #1a242b; opacity: 0.5; }
        .fc-theme-standard td, .fc-theme-standard th { border: 1px solid var(--border) !important; }
        .fc-daygrid-day:hover { background: rgba(37, 99, 235, 0.1) !important; cursor: pointer; }

        /* Botones y Formulario */
        .btn { 
            height: 48px; border-radius: 10px; border: none; font-weight: bold; 
            font-size: 12px; cursor: pointer; color: white; display: flex; 
            align-items: center; justify-content: center; gap: 8px; text-transform: uppercase; width: 100%;
        }
        .primary { background: var(--primary); }
        .danger { background: var(--danger); }
        .ghost { background: var(--ghost); }

        /* Modal */
        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; 
            display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); 
        }
        .modal-content { 
            background: var(--card); padding: 25px; border-radius: 20px; 
            width: 85%; max-width: 350px; border: 1px solid var(--border); text-align: center;
        }
        
        select { 
            width: 100%; height: 50px; margin: 15px 0; border-radius: 10px; 
            border: 1px solid var(--border); background: #1a242b; color: #fff; padding: 0 10px; font-size: 16px;
        }

        #log-panel { 
            background: #000; color: #40c4ff; font-family: monospace; font-size: 10px; 
            padding: 8px; border-radius: 8px; margin-top: 10px; height: 45px; overflow-y: auto; border: 1px solid #333; 
        }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="wrap">
        <div class="main-header">
            <div style="font-size:10px; text-align:center; margin-bottom:8px; color:var(--success)">● SEGURIDAD ACTIVA - CLOUD SYNC</div>
            <div style="display: flex; gap: 8px;">
                <button onclick="location.reload()" class="btn ghost" style="height: 35px;">REINICIAR</button>
                <button onclick="window.scrollTo(0, document.body.scrollHeight)" class="btn ghost" style="height: 35px;">INFO</button>
            </div>
            <div id="log-panel">Iniciando sistema...</div>
        </div>

        <div id="calendar"></div>
    </div>

    <!-- Modal de Acción -->
    <div id="modal-reserva" class="modal hidden">
        <div class="modal-content">
            <h3 id="modal-title" style="margin:0; color:var(--primary)">Cargando...</h3>
            <p id="fecha-texto" style="font-size: 13px; color: var(--success); margin: 10px 0;"></p>
            
            <!-- Crear Reserva -->
            <div id="form-crear">
                <select id="select-uf">
                    <option value="">Cargando Unidades...</option>
                </select>
                <button id="btn-confirmar" class="btn primary">
                    <i class="fab fa-whatsapp"></i> AGENDAR Y AVISAR
                </button>
            </div>

            <!-- Cancelar Reserva -->
            <div id="form-cancelar" class="hidden">
                <div style="background: #1a242b; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px dashed var(--danger);">
                    <p id="info-reserva-actual" style="margin:0; font-size: 14px; font-weight: bold;"></p>
                </div>
                <button id="btn-cancelar-reserva" class="btn danger">
                    <i class="fas fa-trash"></i> ELIMINAR RESERVA
                </button>
            </div>

            <button onclick="cerrarModal()" class="btn ghost" style="margin-top:12px">VOLVER</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = { 
            apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
            authDomain: "gestionuf-remoto.firebaseapp.com", 
            projectId: "gestionuf-remoto", 
            storageBucket: "gestionuf-remoto.firebasestorage.app", 
            messagingSenderId: "724452752860", 
            appId: "1:724452752860:web:4d25585addcdcbd146e319" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // CONFIGURACIÓN ADMIN
        const TEL_ADMINISTRACION = "5491131552679"; 
        const MASTER_CODE = "1131552679"; 
        
        let directorio = {}; 
        let reservasActuales = []; 
        let fechaSel = "";

        const writeLog = (m) => {
            const lp = document.getElementById("log-panel");
            lp.innerHTML += `<div>» ${m}</div>`; 
            lp.scrollTop = lp.scrollHeight;
        };

        // CARGAR UF DESDE LA BASE DE DATOS
        async function cargarDirectorio() {
            const select = document.getElementById("select-uf");
            try {
                const snap = await getDocs(collection(db, "departamentos"));
                if (snap.empty) {
                    writeLog("⚠️ Colección vacía.");
                    select.innerHTML = '<option value="">Sin datos en BD</option>';
                    return;
                }
                select.innerHTML = '<option value="">Elegir Unidad...</option>';
                snap.forEach(d => {
                    const data = d.data();
                    const num = data.UF || data.Unidad;
                    directorio[num] = data.TelefonoInquilino || "Sin número";
                    let opt = document.createElement("option");
                    opt.value = num;
                    opt.innerText = `UF ${num} - ${data.Apellido || ''}`;
                    select.appendChild(opt);
                });
                writeLog("✅ Unidades cargadas.");
            } catch (e) {
                writeLog("❌ Error cargando base.");
            }
        }

        // INICIALIZAR CALENDARIO
        const calendarEl = document.getElementById('calendar');
        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'es',
            headerToolbar: { left: 'prev', center: 'title', right: 'next' },
            dateClick: (info) => abrirGestor(info.dateStr),
            events: []
        });
        calendar.render();

        // SINCRONIZAR RESERVAS EN TIEMPO REAL
        onSnapshot(collection(db, "reservas_salon"), (snap) => {
            reservasActuales = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            const evts = reservasActuales.map(r => ({
                title: `OCUPADO - UF ${r.uf}`,
                start: r.fecha,
                display: 'block',
                backgroundColor: '#e11d48',
                borderColor: '#e11d48'
            }));
            calendar.setOption('events', evts);
        });

        function abrirGestor(fecha) {
            fechaSel = fecha;
            const res = reservasActuales.find(r => r.fecha === fecha);
            const modal = document.getElementById("modal-reserva");
            modal.classList.remove("hidden");
            document.getElementById("fecha-texto").innerText = `Fecha: ${fecha}`;

            if (res) {
                document.getElementById("modal-title").innerText = "Día Ocupado";
                document.getElementById("form-crear").classList.add("hidden");
                document.getElementById("form-cancelar").classList.remove("hidden");
                document.getElementById("info-reserva-actual").innerText = `Reservado por UF ${res.uf}`;
                document.getElementById("btn-cancelar-reserva").onclick = () => eliminarReserva(res.id);
            } else {
                document.getElementById("modal-title").innerText = "Nueva Reserva";
                document.getElementById("form-crear").classList.remove("hidden");
                document.getElementById("form-cancelar").classList.add("hidden");
            }
        }

        document.getElementById("btn-confirmar").onclick = async () => {
            const uf = document.getElementById("select-uf").value;
            if (!uf) return alert("Selecciona una UF");

            try {
                const tel = directorio[uf] || "No reg.";
                await addDoc(collection(db, "reservas_salon"), {
                    fecha: fechaSel,
                    uf: uf,
                    tel: tel,
                    timestamp: new Date()
                });

                const msj = `*RESERVA SUM*%0A📅 Fecha: ${fechaSel}%0A🏢 UF: ${uf}%0A📱 Contacto: ${tel}`;
                window.open(`https://wa.me/${TEL_ADMINISTRACION}?text=${msj}`, '_blank');
                cerrarModal();
            } catch (e) { alert("Error al guardar"); }
        };

        async function eliminarReserva(id) {
            const pass = prompt("CLAVE MAESTRA:");
            if (pass !== MASTER_CODE) return alert("Código incorrecto");
            
            await deleteDoc(doc(db, "reservas_salon", id));
            writeLog("Reserva eliminada.");
            cerrarModal();
        }

        window.cerrarModal = () => document.getElementById("modal-reserva").classList.add("hidden");
        
        cargarDirectorio();
    </script>
</body>
</html>
