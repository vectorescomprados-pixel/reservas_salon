<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="m-date" style="margin:0 0 15px 0; color:#fff; font-size: 20px; font-weight: 800;"></h3>
        
        <div id="ui-crear">
            <input type="text" id="search-input" class="input-styled" placeholder="Buscar Unidad o Apellido...">
            <div id="results" class="results-list" style="display:none"></div>
        </div>

        <div id="ui-ocupado" style="display:none">
            <div style="margin: 10px 0; padding:20px; background: rgba(233,30,99,0.05); border-radius:15px; border: 1px solid #443339;">
                <span id="info-reserva" style="font-size:18px; font-weight: 800; color: #fff;"></span>
            </div>
            <button class="btn btn-red" onclick="abrirSeguridad()" style="margin-bottom: 10px;">Eliminar Reserva</button>
        </div>

        <div id="selection-card" style="display:none; margin: 10px 0; padding: 15px; background: rgba(29,110,215,0.1); border-radius: 12px; border: 1px solid var(--blue);">
            <span id="label-uf" style="font-weight: 900; color: #fff; display: block; margin-bottom: 10px;"></span>
            
            <label for="file-upload" class="file-label" id="file-status">📷 SUBIR COMPROBANTE</label>
            <input type="file" id="file-upload" accept="image/*" style="display:none">
            
            <button class="btn btn-blue" id="btn-confirm" style="display:none">Confirmar Nueva Reserva</button>
            
            <button class="btn btn-blue" id="btn-update-comprobante" style="display:none; background: var(--green);">Actualizar Comprobante</button>
        </div>

        <button class="btn btn-ghost" onclick="closeM()">Volver</button>
    </div>
</div>

<script type="module">
    // ... (Mantén tus imports de Firebase igual) ...

    // --- CONFIGURACIÓN DEL CALENDARIO ACTUALIZADA ---
    const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
        initialView: 'dayGridMonth', 
        locale: 'es', 
        height: 'auto',
        headerToolbar: { left: 'prev', center: 'title', right: 'next' },
        dateClick: (info) => abrir(info.dateStr),
        // SOLUCIÓN PARA ANDROID/CLIC EN ETIQUETA ROJA:
        eventClick: (info) => {
            const fechaStr = info.event.startStr;
            abrir(fechaStr);
        }
    });
    calendar.render();

    // --- FUNCIÓN ABRIR MEJORADA ---
    function abrir(fecha) {
        window.selectedDate = fecha;
        document.getElementById('m-date').innerText = formatFechaLegible(fecha);
        
        // Reset de UI
        input.value = '';
        fileInput.value = '';
        fileStatus.innerText = "📷 SUBIR COMPROBANTE";
        fileStatus.style.color = "#00d2ff";
        document.getElementById('selection-card').style.display = 'none';
        document.getElementById('btn-confirm').style.display = 'none';
        document.getElementById('btn-update-comprobante').style.display = 'none';
        
        const res = reservas.find(r => r.fecha === fecha);
        
        if(res) {
            // MODO: VER/EDITAR EXISTENTE
            window.currentResId = res.id;
            window.currentResInfo = res;
            selUF = { uf: res.uf, inquilino: res.inquilino, tel: res.tel }; // Cargamos datos existentes
            
            document.getElementById('ui-crear').style.display = 'none';
            document.getElementById('ui-ocupado').style.display = 'block';
            document.getElementById('info-reserva').innerText = `RESERVADO: UF ${res.uf} - ${res.inquilino}`;
            
            // Mostramos el cargador de comprobante para la reserva vieja
            document.getElementById('selection-card').style.display = 'block';
            document.getElementById('label-uf').innerText = `UF ${res.uf} | ${res.inquilino}`;
            document.getElementById('btn-update-comprobante').style.display = 'block';
        } else {
            // MODO: NUEVA RESERVA
            document.getElementById('ui-crear').style.display = 'block';
            document.getElementById('ui-ocupado').style.display = 'none';
        }
        document.getElementById('modal').style.display = 'flex';
    }

    // Lógica para el botón de "Solo actualizar comprobante" (WhatsApp)
    document.getElementById('btn-update-comprobante').onclick = () => {
        let mensaje = `*COMPROBANTE SUM PRO*%0A--------------------------%0A*Fecha:* ${formatFechaLegible(window.selectedDate)}%0A*UF:* ${selUF.uf}%0A*Inquilino:* ${selUF.inquilino}%0A%0A✅ Envío el comprobante de pago pendiente.`;
        window.open(`https://wa.me/549${MASTER_KEY}?text=${mensaje}`);
        closeM();
    };

    // ... (El resto de tus funciones como init, confirm-click y seguridad se mantienen igual) ...
</script>
