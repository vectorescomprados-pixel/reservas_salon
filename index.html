<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SUM PRO FINAL</title>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<style>
body { margin:0; background:#0b141a; color:#fff; font-family:sans-serif; }
#calendar { height:85vh; margin:10px; background:#111b21; border-radius:12px; padding:10px; }

.modal { position:fixed; inset:0; background:rgba(0,0,0,.9); display:none; align-items:center; justify-content:center; z-index:99999; }
.modal-content { background:#1c272e; padding:20px; border-radius:20px; width:90%; max-width:360px; text-align:center; }

.input { width:100%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #333; background:#222; color:#fff; text-align:center; }
.btn { width:100%; padding:12px; border:none; border-radius:10px; margin-top:10px; font-weight:bold; cursor:pointer; }
.blue { background:#00a884; color:#fff; }
.green { background:#25d366; color:#fff; }

#preview { width:100%; max-height:200px; display:none; margin:10px 0; border-radius:10px; }
#loading { display:none; color:#00d2ff; margin:10px 0; }
</style>
</head>

<body>

<div id="calendar"></div>

<div id="modal" class="modal">
<div class="modal-content">

<h3 id="fecha-label"></h3>

<div id="ui-search">
<input id="search" class="input" placeholder="Buscar UF o Inquilino">
<div id="results"></div>
</div>

<div id="card" style="display:none">
<p id="info-uf"></p>

<img id="preview">

<label style="display:block; padding:10px; border:2px dashed #444; cursor:pointer">
📷 Subir comprobante
<input type="file" id="file-input" accept="image/*" style="display:none">
</label>

<div id="loading">Subiendo...</div>

<button id="btn-procesar" class="btn blue">GUARDAR</button>
<a id="btn-wa" class="btn green" style="display:none" target="_blank">WHATSAPP</a>

</div>

<button class="btn" onclick="cerrar()">Cerrar</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const config = {
apiKey: "AIzaSyDx...",
authDomain: "gestionuf-remoto.firebaseapp.com",
projectId: "gestionuf-remoto"
};

const app = initializeApp(config);
const db = getFirestore(app);

const CLOUD_NAME = "dhryws88e";
const UPLOAD_PRESET = "ml_default";
const PHONE = "5491131552679";

let dataUFs=[], reservas=[], selUF=null, fotoArchivo=null;

// 🔥 FORMATO FECHA
function formatFecha(fechaISO){
const [y,m,d] = fechaISO.split("-");
return `${d}-${m}-${y.slice(2)}`;
}

// Cargar UFs
(async ()=>{
const snap = await getDocs(collection(db,"departamentos"));
dataUFs = snap.docs.map(d=>({
UF:d.data().UF || d.data().Unidad,
Inquilino:d.data().Inquilino || "Sin Nombre"
}));
})();

// Calendario
const cal = new FullCalendar.Calendar(document.getElementById('calendar'),{
initialView:'dayGridMonth',
locale:'es',
dateClick:i=>abrir(i.dateStr),
eventClick:i=>abrir(i.event.startStr)
});
cal.render();

// Listener
onSnapshot(collection(db,"reservas_salon"), snap=>{
reservas = snap.docs.map(d=>({id:d.id,...d.data()}));
cal.setOption('events', reservas.map(r=>({
title:`UF ${r.uf} • ${r.fechaVisual || formatFecha(r.fecha)}`,
start:r.fecha,
backgroundColor:r.comprobanteUrl ? '#00a884' : '#e91e63'
})));
});

// Abrir modal
window.abrir = (fecha)=>{
selUF=null; fotoArchivo=null; window.fechaSel=fecha;

document.getElementById('modal').style.display="flex";
document.getElementById('fecha-label').innerText=formatFecha(fecha);

document.getElementById('card').style.display="none";
document.getElementById('ui-search').style.display="block";
document.getElementById('btn-wa').style.display="none";

const res = reservas.find(r=>r.fecha===fecha);

if(res){
window.modoReserva=false;
window.idReserva=res.id;
selUF={UF:res.uf, Inquilino:res.inquilino};

document.getElementById('card').style.display="block";
document.getElementById('ui-search').style.display="none";
document.getElementById('info-uf').innerText=`UF ${res.uf} - ${res.inquilino}`;
}else{
window.modoReserva=true;
}
};

window.cerrar=()=>document.getElementById('modal').style.display="none";

// Imagen
document.getElementById('file-input').onchange=(e)=>{
const file=e.target.files[0];
if(!file)return;

fotoArchivo=file;

const reader=new FileReader();
reader.onload=(ev)=>{
const preview=document.getElementById('preview');
preview.src=ev.target.result;
preview.style.display="block";
};
reader.readAsDataURL(file);
};

// Guardar
document.getElementById('btn-procesar').onclick=async()=>{

if(!selUF) return alert("Elegí UF");

const btn=document.getElementById('btn-procesar');
const load=document.getElementById('loading');

btn.style.display="none";
load.style.display="block";

let urlFinal="";

if(fotoArchivo){
const fd=new FormData();
fd.append("file",fotoArchivo);
fd.append("upload_preset",UPLOAD_PRESET);

try{
const r=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{
method:"POST",
body:fd
});
const d=await r.json();
if(d.secure_url) urlFinal=d.secure_url;
}catch(e){
alert("Error subiendo imagen");
}
}

try{

const datos={
fecha:window.fechaSel,
fechaVisual:formatFecha(window.fechaSel),
uf:selUF.UF,
inquilino:selUF.Inquilino,
comprobanteUrl:urlFinal
};

if(window.modoReserva){
await addDoc(collection(db,"reservas_salon"),datos);
}else{
await updateDoc(doc(db,"reservas_salon",window.idReserva),{
comprobanteUrl:urlFinal
});
}

const fWA=formatFecha(window.fechaSel);

const msj=`*RESERVA SUM*
📅 ${fWA}
🏠 UF ${selUF.UF}
👤 ${selUF.Inquilino}
${urlFinal ? `🔗 ${urlFinal}` : 'Sin comprobante'}`;

document.getElementById('btn-wa').href=`https://wa.me/${PHONE}?text=${encodeURIComponent(msj)}`;
document.getElementById('btn-wa').style.display="block";

load.style.display="none";
alert("Guardado OK");

}catch(e){
alert("Error Firebase");
btn.style.display="block";
load.style.display="none";
}

};

// Buscador
document.getElementById('search').oninput=(e)=>{
const v=e.target.value.toLowerCase();
const cont=document.getElementById('results');
cont.innerHTML="";
if(!v)return;

dataUFs
.filter(u=>u.Inquilino.toLowerCase().includes(v)||u.UF.toString().includes(v))
.slice(0,5)
.forEach(u=>{
const d=document.createElement('div');
d.innerText=`UF ${u.UF} - ${u.Inquilino}`;
d.onclick=()=>{
selUF=u;
document.getElementById('card').style.display="block";
document.getElementById('info-uf').innerText=d.innerText;
document.getElementById('ui-search').style.display="none";
};
cont.appendChild(d);
});
};

</script>

</body>
</html>
